<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard · lighter &amp; more modern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

<style>
  body { margin: 0; background: #1A1A1A; font-family: 'DM Sans', system-ui, sans-serif; }

  /* === Shared palette === */
  .dm {
    --red:        #C0392B;
    --red-deep:   #9D2E22;
    --red-soft:   rgba(192,57,43,0.10);
    --gold:       #F0C040;
    --gold-deep:  #8A6500;
    --cream:      #F4EFE3;
    --cream-2:    #FDFCFA;
    --cream-3:    #ECE4D2;
    --border:     #E8E1D2;
    --ink:        #1A1814;
    --ink-2:      #5C5443;
    --muted:      #8A8170;
    --ok:         #1F7C3B;
    --warn:       #B45309;

    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--ink);
    background: var(--cream-2);
    box-sizing: border-box;
    width: 1440px;
    height: 1000px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: 56px 1fr;
  }
  .dm *, .dm *::before, .dm *::after { box-sizing: border-box; }
  .dm svg { display: block; }
  .dm .mono { font-family: 'IBM Plex Mono', monospace; }
  .dm .sora { font-family: 'Sora', sans-serif; }
  .dm .serif { font-family: 'Source Serif 4', Georgia, serif; }

  /* === Topbar (shared, slim) === */
  .dm-top {
    grid-column: 1 / -1;
    background: var(--cream-2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    padding: 0 18px;
  }
  .dm-brand { display: flex; align-items: center; gap: 10px; }
  .dm-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--red); display: grid; place-items: center; color: #fff; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 10px; position: relative; overflow: hidden; }
  .dm-mark::after { content:''; position: absolute; left:0; right:0; bottom:0; height:4px; background: var(--gold); }
  .dm-brand-n { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; color: var(--ink); }
  .dm-pills { display: flex; gap: 8px; margin: 0 auto; }
  .dm-pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; background: var(--cream); border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--ink-2); }
  .dm-pill .l { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
  .dm-pill .v { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 11.5px; color: var(--ink); display: inline-flex; align-items: center; gap: 6px; }
  .dm-pill .v.ok { color: var(--ok); }
  .dm-pill .v.dng { color: var(--red); }
  .dm-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
  .dm-top-r { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .dm-clock { font-family: 'Sora', sans-serif; font-weight: 500; font-size: 11px; color: var(--ink-2); padding-right: 10px; border-right: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .dm-ib { width: 32px; height: 32px; border-radius: 7px; display: grid; place-items: center; color: var(--ink-2); position: relative; }
  .dm-ib svg { width: 16px; height: 16px; }
  .dm-ib .dot { position: absolute; top: 7px; right: 8px; width: 7px; height: 7px; background: var(--red); border-radius: 50%; border: 2px solid var(--cream-2); }
  .dm-user { display: flex; align-items: center; gap: 8px; padding: 4px 10px 4px 4px; background: var(--cream); border: 1px solid var(--border); border-radius: 999px; }
  .dm-user .av { width: 24px; height: 24px; border-radius: 50%; background: var(--red); color: #fff; display: grid; place-items: center; font-family: 'Sora', sans-serif; font-weight: 600; font-size: 10px; }
  .dm-user-m { display: flex; flex-direction: column; line-height: 1.1; align-items: flex-start; }
  .dm-user-m .n { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 11px; }
  .dm-user-m .r { font-size: 9.5px; color: var(--muted); }

  /* === Sidebar === */
  .dm-side { grid-row: 2; background: var(--cream); border-right: 1px solid var(--border); padding: 16px 12px 12px; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
  .dm-side-l { font-family: 'Sora', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; color: var(--gold-deep); padding: 14px 8px 6px; }
  .dm-side-l:first-child { padding-top: 4px; }
  .dm-nav { display: flex; align-items: center; gap: 11px; padding: 8px 11px; border-radius: 8px; font-size: 12.5px; font-weight: 500; color: var(--ink-2); position: relative; cursor: pointer; }
  .dm-nav:hover { background: rgba(255,255,255,0.5); }
  .dm-nav.active { background: #fff; color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .dm-nav.active::before { content:''; position: absolute; left: -12px; top: 7px; bottom: 7px; width: 3px; background: var(--red); border-radius: 0 2px 2px 0; }
  .dm-nav.active .ic { color: var(--red); }
  .dm-nav .ic { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; display: grid; place-items: center; }
  .dm-nav .ic svg { width: 16px; height: 16px; }
  .dm-nav .bdg { margin-left: auto; min-width: 18px; height: 18px; padding: 0 6px; background: var(--red); color: #fff; border-radius: 999px; font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }

  .dm-main { grid-row: 2; overflow: hidden; }

  /* ═══════════════════════════════════════════════════════
     DIRECTION A — "Quiet & spacious"
     Soft shadows replace borders, big numbers, generous gaps
     ═══════════════════════════════════════════════════════ */
  .dA .dm-main {
    background:
      radial-gradient(ellipse at 100% 0%, rgba(240,192,64,0.08), transparent 50%),
      var(--cream-2);
    padding: 36px 44px;
    overflow-y: auto;
  }
  .dA-hello {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .dA-headline {
    font-family: 'Sora', sans-serif;
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 8px;
    max-width: 720px;
  }
  .dA-headline em { font-style: normal; color: var(--red); }
  .dA-headline .next { color: var(--muted); font-weight: 500; }
  .dA-meta {
    display: flex; gap: 22px;
    margin-top: 18px;
    margin-bottom: 36px;
    color: var(--muted);
    font-size: 13px;
  }
  .dA-meta strong { color: var(--ink); font-weight: 600; font-family: 'Sora', sans-serif; }

  .dA-kpis {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .dA-kpi {
    background: #fff;
    border-radius: 18px;
    padding: 22px 24px;
    box-shadow: 0 1px 0 rgba(26,24,20,0.04), 0 12px 32px -16px rgba(26,24,20,0.10);
    display: flex; flex-direction: column; gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .dA-kpi::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    border: 1px solid rgba(255,255,255,0.8);
    pointer-events: none;
  }
  .dA-kpi-l {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dA-kpi-tag {
    font-family: 'Sora', sans-serif;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    background: rgba(31,124,59,0.10);
    color: var(--ok);
    font-weight: 600;
  }
  .dA-kpi-tag.dn { background: rgba(192,57,43,0.08); color: var(--red); }
  .dA-kpi-tag.warn { background: rgba(240,192,64,0.20); color: var(--gold-deep); }
  .dA-kpi-v {
    font-family: 'Sora', sans-serif;
    font-size: 44px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .dA-kpi-v .u { font-size: 18px; color: var(--muted); margin-left: 6px; font-weight: 500; letter-spacing: 0; }
  .dA-kpi-spark { width: 100%; height: 30px; }

  /* Approval flow — kept minimal */
  .dA-flow {
    background: #fff;
    border-radius: 18px;
    padding: 26px 28px;
    box-shadow: 0 1px 0 rgba(26,24,20,0.04), 0 12px 32px -16px rgba(26,24,20,0.10);
    margin-bottom: 32px;
  }
  .dA-flow-h {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px;
  }
  .dA-flow-t { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; color: var(--ink); }
  .dA-flow-m { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .dA-flow-m .btl { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; background: rgba(240,192,64,0.18); color: var(--gold-deep); border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; margin-left: 6px; }
  .dA-flow-bar {
    height: 26px;
    background: var(--cream);
    border-radius: 999px;
    display: flex;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .dA-flow-bar > span {
    display: flex; align-items: center;
    height: 100%;
    padding: 0 14px;
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: rgba(0,0,0,0.78);
    gap: 8px;
  }
  .dA-flow-bar > span .lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(0,0,0,0.55); }
  .dA-flow-phases {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
  }
  .dA-flow-phase { display: flex; flex-direction: column; gap: 4px; }
  .dA-flow-phase .num {
    font-family: 'Sora', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .dA-flow-phase.btl .num { color: var(--gold-deep); }
  .dA-flow-phase .lbl {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .dA-flow-phase .sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 2px;
  }
  .dA-flow-phase .sub.btl { color: var(--gold-deep); font-weight: 600; }

  /* Queue */
  .dA-grid2 {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 22px;
  }
  .dA-card {
    background: #fff;
    border-radius: 18px;
    padding: 24px 26px;
    box-shadow: 0 1px 0 rgba(26,24,20,0.04), 0 12px 32px -16px rgba(26,24,20,0.10);
  }
  .dA-card-h {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 16px;
  }
  .dA-card-t { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; color: var(--ink); }
  .dA-card-m { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .dA-queue { display: flex; flex-direction: column; gap: 4px; }
  .dA-q-row {
    display: grid;
    grid-template-columns: 8px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 12px;
    margin: 0 -12px;
    border-radius: 12px;
    transition: background 0.12s;
  }
  .dA-q-row:hover { background: var(--cream-2); }
  .dA-q-row .pp { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); justify-self: center; }
  .dA-q-row .pp.warn { background: var(--gold); }
  .dA-q-row .pp.dng { background: var(--red); box-shadow: 0 0 0 4px rgba(192,57,43,0.12); }
  .dA-q-main .id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--muted);
    margin-bottom: 2px;
    letter-spacing: 0.04em;
  }
  .dA-q-main .ttl { font-size: 13.5px; color: var(--ink); font-weight: 500; line-height: 1.35; }
  .dA-q-main .sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }
  .dA-q-age {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    text-align: right;
  }
  .dA-q-age.dng { color: var(--red); }
  .dA-q-age.warn { color: var(--warn); }

  /* Solutions in column form */
  .dA-sol {
    display: flex; flex-direction: column; gap: 10px;
  }
  .dA-sol-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 4px;
    cursor: pointer;
  }
  .dA-sol-icon {
    width: 32px; height: 32px;
    border-radius: 9px;
    display: grid; place-items: center;
    color: #fff;
  }
  .dA-sol-icon svg { width: 16px; height: 16px; }
  .dA-sol-icon.red { background: var(--red); }
  .dA-sol-icon.yellow { background: var(--gold); color: var(--gold-deep); }
  .dA-sol-icon.blue { background: #1F6FCC; }
  .dA-sol-icon.green { background: var(--ok); }
  .dA-sol-name {
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }
  .dA-sol-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 2px;
  }
  .dA-sol-arr {
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    color: var(--red);
    font-weight: 600;
    opacity: 0.6;
  }
  .dA-sol-row:hover .dA-sol-arr { opacity: 1; }

  /* ═══════════════════════════════════════════════════════
     DIRECTION B — "Editorial focus"
     Serif headline, single-column narrative
     ═══════════════════════════════════════════════════════ */
  .dB .dm-main {
    background: var(--cream-2);
    padding: 0;
    overflow-y: auto;
  }
  .dB-eyebrow-strip {
    background: var(--ink);
    color: rgba(255,255,255,0.85);
    padding: 10px 48px;
    display: flex; align-items: center; gap: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .dB-eyebrow-strip .live { display: inline-flex; align-items: center; gap: 6px; color: var(--gold); font-weight: 600; }
  .dB-eyebrow-strip .live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .dB-eyebrow-strip .div { color: rgba(255,255,255,0.3); }
  .dB-eyebrow-strip a { color: rgba(255,255,255,0.85); text-decoration: none; }
  .dB-eyebrow-strip .right { margin-left: auto; color: rgba(255,255,255,0.6); }

  .dB-hero {
    padding: 60px 80px 50px;
    border-bottom: 1px solid var(--border);
    background: var(--cream-2);
  }
  .dB-eyebrow {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold-deep);
    font-weight: 700;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .dB-eyebrow::before, .dB-eyebrow::after { content: ''; flex: 0 0 22px; height: 1px; background: var(--gold-deep); opacity: 0.5; }
  .dB-eyebrow::after { display: none; }
  .dB-h {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 60px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 18px;
    max-width: 1080px;
  }
  .dB-h em { font-style: italic; color: var(--red); }
  .dB-dek {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 19px;
    line-height: 1.55;
    color: var(--ink-2);
    max-width: 760px;
    margin-bottom: 32px;
  }
  .dB-actions { display: flex; gap: 10px; }
  .dB-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: 999px; font-family: 'Sora', sans-serif; font-weight: 600; font-size: 13.5px; cursor: pointer; }
  .dB-btn.primary { background: var(--ink); color: #fff; border: 1px solid var(--ink); }
  .dB-btn.primary:hover { background: var(--red); border-color: var(--red); }
  .dB-btn.secondary { background: transparent; color: var(--ink); border: 1px solid var(--border); }
  .dB-btn.secondary:hover { background: var(--cream); }
  .dB-btn svg { width: 15px; height: 15px; }

  .dB-stats-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .dB-stat {
    padding: 28px 32px 32px;
    border-right: 1px solid var(--border);
    background: var(--cream-2);
  }
  .dB-stat:last-child { border-right: 0; }
  .dB-stat-l {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .dB-stat-v {
    font-family: 'Source Serif 4', serif;
    font-size: 44px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .dB-stat-v .u { font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--muted); margin-left: 4px; }
  .dB-stat-d {
    margin-top: 8px;
    font-size: 12px;
    color: var(--ok);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
  }
  .dB-stat-d.dn { color: var(--red); }

  .dB-body {
    padding: 48px 80px;
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 56px;
  }
  .dB-section-t {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--ink);
    margin-bottom: 18px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .dB-section-t .right {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0;
    text-transform: none;
    font-weight: 400;
  }

  .dB-q-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .dB-q-row:last-child { border-bottom: 0; }
  .dB-q-row .ttl {
    font-family: 'Source Serif 4', serif;
    font-size: 19px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .dB-q-row .sub {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .dB-q-row .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    align-self: center;
    text-align: right;
  }
  .dB-q-row .tag.dng { color: var(--red); }
  .dB-q-row .tag.warn { color: var(--warn); }
  .dB-q-row .tag.ok { color: var(--ok); }

  /* Approval flow editorial */
  .dB-flow {
    margin-top: 36px;
  }
  .dB-flow-bar {
    height: 18px;
    background: var(--cream);
    border-radius: 999px;
    display: flex;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .dB-flow-bar > span { height: 100%; display: block; }
  .dB-flow-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .dB-flow-cell { padding: 2px 0; }
  .dB-flow-cell .dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 8px; vertical-align: middle; }

  /* Solutions rail */
  .dB-sol { display: flex; flex-direction: column; gap: 0; }
  .dB-sol-row {
    display: grid;
    grid-template-columns: 40px 1fr auto;

  .dB-sol-icon {

  .dB-sol-icon svg { width: 17px; height: 17px; }
  .dB-sol-icon.red { background: var(--red); }
  .dB-sol-icon.yellow { background: var(--gold); color: var(--gold-deep); }
  .dB-sol-icon.blue { background: #1F6FCC; }
  .dB-sol-icon.green { background: var(--ok); }
  .dB-sol-name {
    font-family: 'Source Serif 4', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .dB-sol-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .dB-sol-arr {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* Notes */
  .design-notes {
    background: #FCFBF8;
    border: 1px solid #E5DFD3;
    color: #1A1814;
    padding: 40px 48px;

    border-radius: 4px;
    width: 1200px;
    font-family: 'DM Sans', sans-serif;
  }
  .design-notes h1 { font-family: 'Source Serif 4', Georgia, serif; font-size: 32px; font-weight: 500; letter-spacing: -0.02em; margin: 0 0 10px; }
  .design-notes h1 em { font-style: italic; color: #C0392B; }
  .design-notes .lead { font-family: 'Source Serif 4', serif; font-size: 17px; color: #3D3830; max-width: 820px; margin-bottom: 22px; }
  .design-notes .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; margin-top: 8px; }
  .design-notes .grid2 .col { padding-top: 18px; border-top: 2px solid #1A1814; }
  .design-notes .grid2 .num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8A8170; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .design-notes .grid2 .h { font-family: 'Source Serif 4', serif; font-size: 22px; font-weight: 500; color: #1A1814; line-height: 1.25; margin-bottom: 10px; }
  .design-notes .grid2 .d { font-size: 13.5px; color: #3D3830; }
  .design-notes h2 { font-family: 'Sora', sans-serif; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #8A6500; font-weight: 700; margin: 28px 0 10px; padding-top: 18px; border-top: 1px solid #E5DFD3; }
  .design-notes p { font-size: 13.5px; color: #3D3830; margin: 0 0 8px; max-width: 880px; }
  .design-notes strong { color: #1A1814; font-weight: 600; }
