<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TPC SolutionHub — Navbar & Sidebar variations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">

<style>
  body { margin: 0; background: #1A1A1A; font-family: 'DM Sans', system-ui, sans-serif; }

  /* ====== Shared shell sizing ====== */
  .vb { color: #0D0D0D; font-family: 'DM Sans', system-ui, sans-serif; box-sizing: border-box; }
  .vb *, .vb *::before, .vb *::after { box-sizing: border-box; }
  .vb svg { display: block; }

  /* Common topbar height + sidebar width */
  .vb { --top: 60px; --side: 232px; }

  /* ==========================================================
     COMMON: layout grid used by all three
     ========================================================== */
  .vb-shell {
    width: 1440px; height: 920px;
    display: grid;
    grid-template-columns: var(--side) 1fr;
    grid-template-rows: var(--top) 1fr;
    overflow: hidden;
  }
  .vb-top { grid-column: 1 / -1; }
  .vb-side { grid-row: 2; }
  .vb-main { grid-row: 2; overflow: hidden; }

  /* Shared topbar internals */
  .vb-top {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    position: relative;
  }
  .vb-top-brand { display: flex; align-items: center; gap: 12px; padding-right: 16px; }
  .vb-top-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: #C0392B;
    display: grid; place-items: center;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-weight: 700; font-size: 11px;
    position: relative;
    overflow: hidden;
  }
  .vb-top-mark::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 4px;
    background: #F0C040;
  }
  .vb-top-brand-name {
    font-family: 'Sora', sans-serif;
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.01em;
  }
  .vb-top-pills {
    display: flex; gap: 8px;
    margin: 0 auto;
  }
  .ppill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .ppill-lbl {
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .ppill-val {
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #16A34A;
    box-shadow: 0 0 0 0 rgba(22,163,74,0.55);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(22,163,74,0.5); }
    100% { box-shadow: 0 0 0 6px rgba(22,163,74,0); }
  }
  .vb-top-right {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto;
  }
  .vb-clock {
    font-family: 'Sora', sans-serif;
    font-weight: 500; font-size: 12px;
    font-variant-numeric: tabular-nums;
    padding-right: 10px;
    margin-right: 2px;
  }
  .vb-ibtn {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: grid; place-items: center;
    position: relative;
  }
  .vb-ibtn svg { width: 16px; height: 16px; }
  .vb-ibtn .dot {
    position: absolute; top: 8px; right: 9px;
    width: 7px; height: 7px;
    background: #C0392B;
    border-radius: 50%;
  }
  .vb-lang {
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px; font-weight: 600;
    font-family: 'Sora', sans-serif;
  }
  .vb-user {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 12px 4px 4px;
    border-radius: 999px;
  }
  .vb-user .av {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #C0392B;
    color: #fff;
    display: grid; place-items: center;
    font-family: 'Sora', sans-serif;
    font-weight: 600; font-size: 11px;
  }
  .vb-user-meta { display: flex; flex-direction: column; line-height: 1.15; align-items: flex-start; }
  .vb-user-name { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 12px; }
  .vb-user-role { font-size: 10px; }

  /* Shared sidebar internals */
  .vb-side {
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .vb-side-nav { padding: 18px 14px 8px; display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: hidden; }
  .vb-side-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    padding: 14px 8px 6px;
  }
  .vb-side-label:first-child { padding-top: 4px; }
  .vb-nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    position: relative;
    cursor: pointer;
  }
  .vb-nav-item .ico { width: 17px; height: 17px; display: grid; place-items: center; opacity: 0.9; flex-shrink: 0; }
  .vb-nav-item .ico svg { width: 16px; height: 16px; }
  .vb-nav-item .bdg {
    margin-left: auto;
    min-width: 18px; height: 18px;
    padding: 0 6px;
    background: #C0392B;
    color: #fff;
    border-radius: 999px;
    font-family: 'Sora', sans-serif;
    font-size: 10px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .vb-role {
    margin: 8px 14px 12px;
    padding: 12px;
    border-radius: 10px;
  }
  .vb-role-l {
    font-family: 'Sora', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .vb-role-s {
    width: 100%;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
  }

  /* Main content shared */
  .vb-main { background: #F7F8FA; padding: 24px 32px; overflow: hidden; }
  .vb-hero {
    background: #fff;
    border: 1px solid #E2E6EA;
    border-radius: 12px;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    margin-bottom: 20px;
  }
  .vb-hero-l { min-width: 0; }
  .vb-eyebrow {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6B7280;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .vb-h1 {
    font-family: 'Sora', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: #0D0D0D;
  }
  .vb-h1 em {
    font-style: normal;
    color: #C0392B;
  }
  .vb-h1-sub {
    color: #6B7280;
    font-size: 17px;
    font-weight: 400;
    font-family: 'DM Sans', sans-serif;
  }
  .vb-hero-meta {
    display: flex; gap: 18px;
    margin-top: 16px;
    color: #6B7280;
    font-size: 12.5px;
  }
  .vb-hero-meta strong { color: #0D0D0D; font-weight: 600; }
  .vb-hero-r { display: flex; align-items: center; gap: 28px; flex-shrink: 0; }
  .vb-ring { width: 100px; height: 100px; position: relative; }
  .vb-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .vb-ring .c { fill: none; stroke-width: 10; }
  .vb-ring-center {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: 'Sora', sans-serif;
    font-weight: 700; font-size: 22px;
  }
  .vb-kpi {
    border-left: 1px solid #E2E6EA;
    padding-left: 24px;
  }
  .vb-kpi-v {
    font-family: 'Sora', sans-serif;
    font-size: 48px;
    font-weight: 800;
    color: #1A1A2E;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .vb-kpi-l {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6B7280;
    font-weight: 600;
    margin-top: 8px;
  }

  /* KPI strip */
  .vb-kpis {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }
  .vb-kcard {
    background: #fff;
    border: 1px solid #E2E6EA;
    border-radius: 10px;
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .vb-kcard::before {
    content: '';
    position: absolute; top: 14px; left: 0;
    width: 3px; height: 22px;
    background: var(--kc, #C0392B);
    border-radius: 0 2px 2px 0;
  }
  .vb-kcard-l { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #6B7280; font-weight: 600; }
  .vb-kcard-v { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 700; color: #1A1A2E; line-height: 1; letter-spacing: -0.02em; }
  .vb-kcard-d { font-size: 11px; color: #16A34A; font-weight: 600; }
  .vb-kcard-d.dn { color: #C0392B; }

  /* Queue list */
  .vb-row {
    display: grid;
    grid-template-columns: 24px 90px 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #E2E6EA;
    font-size: 13px;
  }
  .vb-row:last-child { border-bottom: 0; }
  .vb-row .pip {
    width: 8px; height: 8px; border-radius: 50%;
    background: #16A34A; justify-self: center;
  }
  .vb-row .pip.warn { background: #F59E0B; }
  .vb-row .pip.dng { background: #DC2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
  .vb-row .id { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #6B7280; }
  .vb-row .ttl { color: #0D0D0D; font-weight: 500; }
  .vb-row .site { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #6B7280; text-transform: uppercase; }
  .vb-row .age { font-family: 'Sora', sans-serif; font-size: 11px; color: #6B7280; font-weight: 600; }
  .vb-row .age.warn { color: #B45309; }
  .vb-row .age.dng { color: #DC2626; }

  .vb-card {
    background: #fff;
    border: 1px solid #E2E6EA;
    border-radius: 10px;
    padding: 20px 24px;
  }
  .vb-card-h {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .vb-card-t {
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .vb-card-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #6B7280;
  }

  /* ==========================================================
     A — FROST: clean white topbar, white sidebar, red accent
     ========================================================== */
  .va .vb-top {
    background: #fff;
    border-bottom: 1px solid #E2E6EA;
    color: #0D0D0D;
  }
  .va .vb-top-brand-name { color: #0D0D0D; }
  .va .ppill {
    background: #F7F8FA;
    border: 1px solid #E2E6EA;
    color: #475467;
  }
  .va .ppill-lbl { color: #6B7280; }
  .va .ppill-val { color: #0D0D0D; }
  .va .ppill-val.ok { color: #16A34A; }
  .va .ppill-val.dng { color: #DC2626; }

  .va .vb-clock { color: #475467; border-right: 1px solid #E2E6EA; }
  .va .vb-clock strong { color: #0D0D0D; }
  .va .vb-lang {
    background: #F7F8FA;
    border: 1px solid #E2E6EA;
    color: #475467;
  }
  .va .vb-ibtn { color: #475467; }
  .va .vb-ibtn:hover { background: #F7F8FA; }
  .va .vb-ibtn .dot { border: 2px solid #fff; }
  .va .vb-user {
    background: #F7F8FA;
    border: 1px solid #E2E6EA;
  }
  .va .vb-user-name { color: #0D0D0D; }
  .va .vb-user-role { color: #6B7280; }

  .va .vb-side {
    background: #fff;
    border-right: 1px solid #E2E6EA;
  }
  .va .vb-side-label { color: #C0392B; }
  .va .vb-nav-item { color: #475467; }
  .va .vb-nav-item:hover { background: #F7F8FA; color: #0D0D0D; }
  .va .vb-nav-item.active {
    background: rgba(192,57,43,0.08);
    color: #C0392B;
    font-weight: 600;
  }
  .va .vb-nav-item.active::before {
    content: '';
    position: absolute;
    left: -14px; top: 6px; bottom: 6px;
    width: 3px;
    background: #C0392B;
    border-radius: 0 2px 2px 0;
  }
  .va .vb-nav-item.active .ico { color: #C0392B; }
  .va .vb-role {
    background: #F7F8FA;
    border: 1px solid #E2E6EA;
  }
  .va .vb-role-l { color: #6B7280; }
  .va .vb-role-s {
    background: #fff;
    border: 1px solid #E2E6EA;
    color: #0D0D0D;
  }
  .va .vb-side-foot {
    padding: 12px 18px;
    border-top: 1px solid #E2E6EA;
    font-size: 11px;
    color: #6B7280;
    display: flex; align-items: center; gap: 8px;
  }
  .va .vb-side-foot .pulse { background: #16A34A; }

  /* ==========================================================
     B — IVORY: warm cream sidebar, white topbar, gold accents
     ========================================================== */
  .vbb .vb-top {
    background: #FDFCFA;
    border-bottom: 1px solid #E8E1D2;
    color: #1A1814;
  }
  .vbb .vb-top-brand-name { color: #1A1814; font-family: 'Sora', sans-serif; }
  .vbb .ppill {
    background: #F4EFE3;
    border: 1px solid #E8E1D2;
    color: #5C5443;
  }
  .vbb .ppill-lbl { color: #8A8170; }
  .vbb .ppill-val { color: #1A1814; }
  .vbb .ppill-val.ok { color: #1F7C3B; }
  .vbb .ppill-val.dng { color: #C0392B; }

  .vbb .vb-clock { color: #5C5443; border-right: 1px solid #E8E1D2; }
  .vbb .vb-clock strong { color: #1A1814; }
  .vbb .vb-lang {
    background: #F4EFE3;
    border: 1px solid #E8E1D2;
    color: #5C5443;
  }
  .vbb .vb-ibtn { color: #5C5443; }
  .vbb .vb-ibtn:hover { background: #F4EFE3; }
  .vbb .vb-user {
    background: #F4EFE3;
    border: 1px solid #E8E1D2;
  }
  .vbb .vb-user-name { color: #1A1814; }
  .vbb .vb-user-role { color: #8A8170; }

  .vbb .vb-side {
    background: #F4EFE3;
    border-right: 1px solid #E8E1D2;
  }
  .vbb .vb-side-label { color: #8A6500; }
  .vbb .vb-nav-item { color: #5C5443; }
  .vbb .vb-nav-item:hover { background: rgba(255,255,255,0.5); color: #1A1814; }
  .vbb .vb-nav-item.active {
    background: #fff;
    color: #1A1814;
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .vbb .vb-nav-item.active::before {
    content: '';
    position: absolute;
    left: -14px; top: 8px; bottom: 8px;
    width: 3px;
    background: #C0392B;
    border-radius: 0 2px 2px 0;
  }
  .vbb .vb-nav-item.active .ico { color: #C0392B; }
  .vbb .vb-nav-item .bdg { background: #C0392B; }
  .vbb .vb-role {
    background: rgba(255,255,255,0.55);
    border: 1px solid #E8E1D2;
  }
  .vbb .vb-role-l { color: #8A6500; }
  .vbb .vb-role-s {
    background: #fff;
    border: 1px solid #E8E1D2;
    color: #1A1814;
  }
  .vbb .vb-side-foot {
    padding: 12px 18px;
    border-top: 1px solid #E8E1D2;
    font-size: 11px;
    color: #8A8170;
    display: flex; align-items: center; gap: 8px;
  }
  .vbb .vb-main {
    background: #FDFCFA;
  }
  .vbb .vb-hero, .vbb .vb-kcard, .vbb .vb-card {
    border-color: #E8E1D2;
  }
  .vbb .vb-kpi { border-left-color: #E8E1D2; }
  .vbb .vb-row { border-color: #E8E1D2; }

  /* ==========================================================
     C — GRAPHITE: warm sand topbar, soft graphite sidebar
     ========================================================== */
  .vc .vb-top {
    background: #ECE9E2;
    border-bottom: 1px solid #DAD5C9;
    color: #1F1F1F;
  }
  .vc .vb-top-brand-name { color: #1F1F1F; }
  .vc .ppill {
    background: #fff;
    border: 1px solid #DAD5C9;
    color: #4A4A4A;
  }
  .vc .ppill-lbl { color: #757575; }
  .vc .ppill-val { color: #1F1F1F; }
  .vc .ppill-val.ok { color: #16A34A; }
  .vc .ppill-val.dng { color: #C0392B; }

  .vc .vb-clock { color: #4A4A4A; border-right: 1px solid #DAD5C9; }
  .vc .vb-clock strong { color: #1F1F1F; }
  .vc .vb-lang {
    background: #fff;
    border: 1px solid #DAD5C9;
    color: #4A4A4A;
  }
  .vc .vb-ibtn { color: #4A4A4A; }
  .vc .vb-ibtn:hover { background: rgba(255,255,255,0.6); }
  .vc .vb-user {
    background: #fff;
    border: 1px solid #DAD5C9;
  }
  .vc .vb-user-name { color: #1F1F1F; }
  .vc .vb-user-role { color: #6B7280; }

  .vc .vb-side {
    background: #2E2E33;
    border-right: 1px solid #1F1F23;
    color: rgba(255,255,255,0.82);
  }
  .vc .vb-side-label {
    color: #F0C040;
  }
  .vc .vb-nav-item { color: rgba(255,255,255,0.78); }
  .vc .vb-nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .vc .vb-nav-item.active {
    background: rgba(240,192,64,0.12);
    color: #fff;
    font-weight: 600;
  }
  .vc .vb-nav-item.active::before {
    content: '';
    position: absolute;
    left: -14px; top: 6px; bottom: 6px;
    width: 3px;
    background: #F0C040;
    border-radius: 0 2px 2px 0;
  }
  .vc .vb-nav-item.active .ico { color: #F0C040; }
  .vc .vb-nav-item .bdg { background: #C0392B; }
  .vc .vb-role {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .vc .vb-role-l { color: #F0C040; }
  .vc .vb-role-s {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
  }
  .vc .vb-side-foot {
    padding: 12px 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    display: flex; align-items: center; gap: 8px;
  }

  /* ============== Design notes header ============== */
  .design-notes {
    background: #FCFBF8;
    border: 1px solid #E5DFD3;
    color: #1A1814;
    padding: 36px 44px;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.55;
    border-radius: 4px;
    width: 1200px;
  }
  .design-notes h1 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
  }
  .design-notes h1 em { font-style: italic; color: #C0392B; }
  .design-notes .lead {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 17px;
    color: #3D3830;
    margin: 0 0 24px;
    max-width: 820px;
  }
  .design-notes .row {
    display: grid;
    grid-template-columns: 90px 220px 1fr;
    gap: 24px;
    padding: 16px 0;
    border-top: 1px solid #E5DFD3;
    align-items: start;
  }
  .design-notes .swatch {
    display: flex; gap: 4px;
    height: 38px;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid #E5DFD3;
  }
  .design-notes .swatch span { flex: 1; }
  .design-notes .row .name {
    font-family: 'Source Serif 4', serif;
    font-size: 19px;
    font-weight: 500;
    color: #1A1814;
    letter-spacing: -0.01em;
  }
  .design-notes .row .name .sub {
