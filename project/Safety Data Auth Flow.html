<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Safety Data Management · Access Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">

<style>
  body { margin: 0; background: #1A1A1A; font-family: 'DM Sans', system-ui, sans-serif; }

  /* === Ivory palette === */
  .sd {
    --red: #C0392B;
    --red-soft: rgba(192,57,43,0.10);
    --red-tint: rgba(192,57,43,0.18);
    --red-deep: #9D2E22;
    --gold: #F0C040;
    --gold-deep: #8A6500;
    --cream: #F4EFE3;
    --cream-2: #FDFCFA;
    --cream-3: #ECE4D2;
    --border: #E8E1D2;
    --ink: #1A1814;
    --ink-2: #5C5443;
    --muted: #8A8170;
    --ok: #1F7C3B;
    --warn: #B45309;
    --dng: #C0392B;

    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--ink);
    box-sizing: border-box;
    line-height: 1.5;
  }
  .sd *, .sd *::before, .sd *::after { box-sizing: border-box; }
  .sd svg { display: block; }
  .sd .sora { font-family: 'Sora', sans-serif; }
  .sd .mono { font-family: 'IBM Plex Mono', monospace; }

  /* === Shell shared by full-app screens === */
  .sd-shell {
    width: 1280px; height: 800px;
    background: var(--cream-2);
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }
  .sd-top { grid-column: 1 / -1; background: var(--cream-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; padding: 0 18px; }
  .sd-side { grid-row: 2; background: var(--cream); border-right: 1px solid var(--border); padding: 16px 12px 12px; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
  .sd-main { grid-row: 2; overflow: hidden; padding: 24px 28px; }

  /* Topbar bits */
  .sd-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--red); display: grid; place-items: center; color: #fff; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 10px; position: relative; overflow: hidden; }
  .sd-mark::after { content:''; position: absolute; left:0; right:0; bottom:0; height: 4px; background: var(--gold); }
  .sd-brand { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; color: var(--ink); }
  .sd-crumb { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .sd-crumb .sep { color: #CBC3B0; }
  .sd-crumb .now { color: var(--ink); }
  .sd-top-r { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .sd-clock { font-family: 'Sora', sans-serif; font-weight: 500; font-size: 11px; color: var(--ink-2); padding-right: 10px; border-right: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .sd-ibtn { width: 32px; height: 32px; border-radius: 7px; display: grid; place-items: center; color: var(--ink-2); position: relative; cursor: pointer; }
  .sd-ibtn:hover { background: var(--cream); }
  .sd-ibtn svg { width: 16px; height: 16px; }
  .sd-ibtn .dot { position: absolute; top: 7px; right: 8px; width: 7px; height: 7px; background: var(--red); border-radius: 50%; border: 2px solid var(--cream-2); }
  .sd-user { display: flex; align-items: center; gap: 8px; padding: 4px 10px 4px 4px; background: var(--cream); border: 1px solid var(--border); border-radius: 999px; }
  .sd-user .av { width: 24px; height: 24px; border-radius: 50%; background: var(--red); color: #fff; display: grid; place-items: center; font-family: 'Sora', sans-serif; font-weight: 600; font-size: 10px; }
  .sd-user-meta { display: flex; flex-direction: column; line-height: 1.1; align-items: flex-start; }
  .sd-user-meta .n { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 11px; color: var(--ink); }
  .sd-user-meta .r { font-size: 9.5px; color: var(--muted); }

  /* Sidebar */
  .sd-nav-l { font-family: 'Sora', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; color: var(--gold-deep); padding: 14px 8px 6px; }
  .sd-nav-l:first-child { padding-top: 4px; }
  .sd-nav { display: flex; align-items: center; gap: 11px; padding: 8px 11px; border-radius: 8px; font-size: 12.5px; font-weight: 500; color: var(--ink-2); position: relative; cursor: pointer; }
  .sd-nav:hover { background: rgba(255,255,255,0.5); color: var(--ink); }
  .sd-nav.active { background: #fff; color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .sd-nav.active::before { content:''; position: absolute; left: -12px; top: 7px; bottom: 7px; width: 3px; background: var(--red); border-radius: 0 2px 2px 0; }
  .sd-nav.active .ic { color: var(--red); }
  .sd-nav .ic { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; display: grid; place-items: center; }
  .sd-nav .ic svg { width: 16px; height: 16px; }
  .sd-nav .bdg { margin-left: auto; min-width: 18px; height: 18px; padding: 0 6px; background: var(--red); color: #fff; border-radius: 999px; font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .sd-nav .lock { margin-left: auto; opacity: 0.5; display: grid; place-items: center; }
  .sd-nav .lock svg { width: 13px; height: 13px; }

  /* Page header */
  .sd-page-h { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; gap: 24px; }
  .sd-page-t { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); }
  .sd-page-s { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .sd-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; font-family: 'Sora', sans-serif; font-size: 12.5px; font-weight: 600; border-radius: 8px; background: #fff; border: 1px solid var(--border); color: var(--ink); cursor: pointer; }
  .sd-btn:hover { background: var(--cream); }
  .sd-btn svg { width: 14px; height: 14px; }
  .sd-btn.primary { background: var(--red); color: #fff; border-color: var(--red); }
  .sd-btn.primary:hover { background: var(--red-deep); border-color: var(--red-deep); }
  .sd-btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }

  /* Solutions grid */
  .sol-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sol-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 12px; position: relative; cursor: pointer; transition: box-shadow .14s, transform .14s; min-height: 200px; }
  .sol-card:hover { box-shadow: 0 4px 12px rgba(26,24,20,0.06); transform: translateY(-1px); }
  .sol-icon { width: 38px; height: 38px; border-radius: 9px; display: grid; place-items: center; color: #fff; }
  .sol-icon svg { width: 19px; height: 19px; }
  .sol-icon.red { background: var(--red); }
  .sol-icon.yellow { background: var(--gold); color: var(--gold-deep); }
  .sol-icon.blue { background: #1F6FCC; }
  .sol-icon.green { background: var(--ok); }
  .sol-name { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 15px; color: var(--ink); letter-spacing: -0.01em; }
  .sol-desc { font-size: 12.5px; color: var(--ink-2); line-height: 1.45; }
  .sol-foot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .sol-badge { position: absolute; top: 18px; right: 18px; font-family: 'Sora', sans-serif; font-size: 9.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 7px; border-radius: 999px; }
  .sol-badge.locked { background: rgba(138,129,112,0.14); color: var(--muted); display: inline-flex; align-items: center; gap: 4px; }
  .sol-badge.locked svg { width: 11px; height: 11px; }
  .sol-badge.live { background: rgba(31,124,59,0.12); color: var(--ok); }
  .sol-badge.live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); display: inline-block; margin-right: 4px; vertical-align: middle; }
  .sol-card.locked { background: var(--cream-2); border-style: dashed; }
  .sol-card.locked .sol-name, .sol-card.locked .sol-desc { color: var(--muted); }
  .sol-card.locked .sol-icon { background: var(--cream-3); color: var(--muted); }

  /* Gate / auth screen */
  .gate-wrap {
    width: 1280px; height: 800px;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(192,57,43,0.06), transparent 40%),
      radial-gradient(ellipse at 90% 110%, rgba(240,192,64,0.10), transparent 40%),
      var(--cream-2);
    display: grid;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }
  .gate-top { background: var(--cream-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 18px; gap: 14px; }
  .gate-body { display: grid; grid-template-columns: 1.05fr 1fr; align-items: stretch; }
  .gate-l { padding: 64px 72px; display: flex; flex-direction: column; justify-content: center; }
  .gate-eyebrow { font-family: 'Sora', sans-serif; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold-deep); font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .gate-eyebrow .ic { width: 28px; height: 28px; border-radius: 7px; background: var(--red); color: #fff; display: grid; place-items: center; }
  .gate-eyebrow .ic svg { width: 14px; height: 14px; }
  .gate-h { font-family: 'Source Serif 4', Georgia, serif; font-size: 42px; line-height: 1.1; font-weight: 500; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 14px; max-width: 520px; }
  .gate-h em { font-style: italic; color: var(--red); }
  .gate-d { font-family: 'Source Serif 4', Georgia, serif; font-size: 17px; color: var(--ink-2); max-width: 480px; line-height: 1.5; margin-bottom: 28px; }
  .gate-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 480px; padding-top: 18px; border-top: 1px solid var(--border); }
  .gate-meta-row { display: flex; flex-direction: column; gap: 4px; }
  .gate-meta-l { font-family: 'Sora', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .gate-meta-v { font-size: 13px; color: var(--ink); font-weight: 500; }

  .gate-r { background: #fff; border-left: 1px solid var(--border); padding: 64px 72px; display: flex; flex-direction: column; justify-content: center; position: relative; }
  .gate-form-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .gate-form-h { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.01em; }
  .gate-form-s { font-size: 13.5px; color: var(--ink-2); margin-bottom: 28px; }
  .gate-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .gate-field-l { font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-2); }
  .gate-field input {
    height: 46px;
    background: var(--cream-2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    color: var(--ink);
    outline: none;
    letter-spacing: 0.2em;
  }
  .gate-field input:focus { border-color: var(--red); background: #fff; box-shadow: 0 0 0 3px var(--red-soft); }
  .gate-field-row { display: flex; align-items: center; justify-content: space-between; }
  .gate-field-row a { font-size: 12px; color: var(--red); text-decoration: none; font-weight: 500; }
  .gate-helper { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .gate-helper.ok { color: var(--ok); }
  .gate-helper svg { width: 13px; height: 13px; }
  .gate-cta { display: flex; gap: 10px; margin-top: 8px; }
  .gate-cta .sd-btn.primary { padding: 12px 22px; font-size: 13.5px; }
  .gate-cta .sd-btn { padding: 12px 18px; }
  .gate-info { margin-top: 28px; padding-top: 20px; border-top: 1px dashed var(--border); display: flex; gap: 10px; align-items: flex-start; }
  .gate-info-ic { width: 28px; height: 28px; border-radius: 50%; background: var(--cream); color: var(--gold-deep); display: grid; place-items: center; flex-shrink: 0; }
  .gate-info-ic svg { width: 14px; height: 14px; }
  .gate-info-text { font-size: 12px; color: var(--ink-2); line-height: 1.5; }
  .gate-info-text strong { color: var(--ink); }

  /* Denied screen */
  .gate-r.denied { background: var(--cream); }
  .deny-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px 4px 8px; background: rgba(192,57,43,0.10); color: var(--red); border: 1px solid var(--red-tint); border-radius: 999px; font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .deny-badge svg { width: 12px; height: 12px; }
  .deny-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-top: 20px; }
  .deny-card-h { font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 10px; letter-spacing: -0.005em; }
  .deny-list { display: flex; flex-direction: column; gap: 8px; font-size: 12.5px; color: var(--ink-2); }
  .deny-list-row { display: grid; grid-template-columns: 14px 1fr; gap: 8px; align-items: start; }
  .deny-list-row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin-top: 7px; }
  .deny-contact { display: flex; align-items: center; gap: 10px; padding: 14px; background: var(--cream-2); border-radius: 8px; margin-top: 16px; border: 1px solid var(--border); }
  .deny-contact .av { width: 36px; height: 36px; border-radius: 50%; background: var(--gold); color: var(--gold-deep); display: grid; place-items: center; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px; }
  .deny-contact-meta { line-height: 1.25; }
  .deny-contact-meta .n { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 13px; color: var(--ink); }
  .deny-contact-meta .r { font-size: 11.5px; color: var(--muted); }

  /* Request access form */
  .req-form .gate-field textarea {
    background: var(--cream-2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    outline: none;
    min-height: 90px;
    resize: vertical;
    line-height: 1.5;
  }
  .req-form .gate-field textarea:focus { border-color: var(--red); background: #fff; box-shadow: 0 0 0 3px var(--red-soft); }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .role-pick {
    display: flex; align-items: center; gap: 9px;
    padding: 10px 12px;
    background: var(--cream-2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .role-pick .rd { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; position: relative; }
  .role-pick.checked { border-color: var(--red); background: var(--red-soft); color: var(--ink); font-weight: 600; }
  .role-pick.checked .rd { border-color: var(--red); }
  .role-pick.checked .rd::after { content: ''; position: absolute; inset: 2px; background: var(--red); border-radius: 50%; }
  .role-pick .sub { font-size: 10.5px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  /* Sent confirmation */
  .sent-medal { width: 80px; height: 80px; border-radius: 50%; background: var(--ok); color: #fff; display: grid; place-items: center; margin-bottom: 22px; box-shadow: 0 0 0 12px rgba(31,124,59,0.12); }
  .sent-medal svg { width: 36px; height: 36px; }
  .sent-h { font-family: 'Source Serif 4', serif; font-size: 36px; font-weight: 500; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 10px; max-width: 480px; }
  .sent-d { font-family: 'Source Serif 4', serif; font-size: 16px; color: var(--ink-2); max-width: 460px; margin-bottom: 28px; line-height: 1.5; }
  .sent-timeline { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; max-width: 480px; }
  .sent-step { display: grid; grid-template-columns: 28px 1fr auto; gap: 12px; align-items: start; padding: 10px 0; position: relative; }
  .sent-step:not(:last-child)::after { content: ''; position: absolute; left: 13px; top: 32px; width: 2px; height: calc(100% - 18px); background: var(--border); }
  .sent-step .pip { width: 26px; height: 26px; border-radius: 50%; background: var(--cream-2); border: 2px solid var(--border); display: grid; place-items: center; color: var(--muted); position: relative; z-index: 1; }
  .sent-step .pip svg { width: 13px; height: 13px; }
  .sent-step.done .pip { background: var(--ok); border-color: var(--ok); color: #fff; }
  .sent-step.active .pip { background: #fff; border-color: var(--red); color: var(--red); }
  .sent-step.active::after { background: var(--border) !important; }
  .sent-step .ttl { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 13px; color: var(--ink); }
  .sent-step .sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .sent-step .time { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--muted); }

  /* SDM inside */
  .sd-side-locked { border-top: 1px solid var(--border); margin: 12px 0; padding-top: 8px; }
  .sd-banner-secure { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: rgba(31,124,59,0.08); color: var(--ok); font-family: 'Sora', sans-serif; font-size: 11.5px; font-weight: 500; border-bottom: 1px solid rgba(31,124,59,0.14); }
  .sd-banner-secure svg { width: 14px; height: 14px; }
  .sd-banner-secure .right { margin-left: auto; font-family: 'IBM Plex Mono', monospace; color: var(--ok); }

  .sdm-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .sdm-stat { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .sdm-stat-l { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .sdm-stat-v { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1; letter-spacing: -0.02em; }
  .sdm-stat-d { font-size: 11px; color: var(--ok); margin-top: 4px; font-weight: 600; }
  .sdm-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; }
  .sdm-card-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .sdm-card-t { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px; color: var(--ink); }
  .sdm-q-row { display: grid; grid-template-columns: 8px 90px 1fr 80px 80px; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 12.5px; }
  .sdm-q-row:last-child { border-bottom: 0; }
  .sdm-q-row .pp { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); justify-self: center; }
  .sdm-q-row .pp.warn { background: var(--gold); }
  .sdm-q-row .pp.dng { background: var(--red); box-shadow: 0 0 0 3px rgba(192,57,43,0.12); }
  .sdm-q-row .id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .sdm-q-row .ttl { color: var(--ink); font-weight: 500; }
  .sdm-q-row .site { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .sdm-q-row .age { font-family: 'Sora', sans-serif; font-size: 11px; color: var(--muted); font-weight: 600; text-align: right; }
  .sdm-q-row .age.dng { color: var(--red); }
  .sdm-q-row .age.warn { color: var(--warn); }

  /* Access history */
  .hist-h { display: grid; grid-template-columns: 90px 100px 1fr 120px 100px; gap: 14px; padding: 10px 14px; background: var(--cream); border: 1px solid var(--border); border-radius: 8px 8px 0 0; font-family: 'Sora', sans-serif; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .hist-row { display: grid; grid-template-columns: 90px 100px 1fr 120px 100px; gap: 14px; padding: 12px 14px; border: 1px solid var(--border); border-top: 0; background: #fff; font-size: 12.5px; align-items: center; }
  .hist-row:last-child { border-radius: 0 0 8px 8px; }
  .hist-row .date { font-family: 'IBM Plex Mono', monospace; color: var(--ink-2); }
