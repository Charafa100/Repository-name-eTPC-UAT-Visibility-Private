<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hub Approval Flow · variations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">

<style>
  body { margin: 0; background: #1A1A1A; font-family: 'DM Sans', system-ui, sans-serif; }

  .af {
    --red: #C0392B;
    --red-soft: rgba(192,57,43,0.10);
    --red-deep: #9D2E22;
    --gold: #F0C040;
    --gold-deep: #8A6500;
    --cream: #F4EFE3;
    --cream-2: #FDFCFA;
    --cream-3: #ECE4D2;
    --border: #E8E1D2;
    --ink: #1A1814;
    --ink-2: #5C5443;
    --muted: #8A8170;
    --ok: #1F7C3B;
    --warn: #B45309;

    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--ink);
    box-sizing: border-box;
  }
  .af *, .af *::before, .af *::after { box-sizing: border-box; }
  .af svg { display: block; }

  /* Card frame (matches the dashboard) */
  .af-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .af-card-h {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .af-card-h-t {
    font-family: 'Sora', sans-serif;
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.01em;
    color: var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .af-card-h-t .ic { width: 16px; height: 16px; color: var(--muted); }
  .af-card-h-t .pill {
    margin-left: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    padding: 3px 9px;
    background: var(--cream);
    color: var(--ink-2);
    border-radius: 999px;
    font-weight: 500;
  }
  .af-card-h-m {
    display: flex; align-items: center; gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .af-card-h-m .btl {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px;
    background: rgba(240,192,64,0.16);
    border: 1px solid rgba(240,192,64,0.45);
    border-radius: 6px;
    color: var(--gold-deep);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
  }

  /* ═══════════════════════════════════════════════════════════
     OPTION A — Generic 4 stages, aggregated across solutions
     ═══════════════════════════════════════════════════════════ */
  .opA { padding: 24px; }
  .opA-eyebrow {
    font-family: 'Sora', sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 14px;
  }

  .opA-stages {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .opA-stage {
    background: var(--cream-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    position: relative;
    display: flex; flex-direction: column; gap: 10px;
  }
  .opA-stage.btl {
    background: linear-gradient(180deg, rgba(240,192,64,0.12), rgba(240,192,64,0.04));
    border-color: rgba(240,192,64,0.45);
  }
  .opA-stage-l {
    display: flex; align-items: center; justify-content: space-between;
  }
  .opA-stage-name {
    font-family: 'Sora', sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }
  .opA-stage.btl .opA-stage-name { color: var(--gold-deep); }
  .opA-stage-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    color: var(--muted);
    padding: 2px 6px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .opA-stage.btl .opA-stage-tag {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
    font-weight: 700;
  }
  .opA-stage-v {
    font-family: 'Sora', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .opA-stage-bar {
    height: 6px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }
  .opA-stage-bar span {
    height: 100%;
    display: block;
  }
  .opA-stage-leg {
    display: flex; gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-2);
    flex-wrap: wrap;
  }
  .opA-stage-leg .ldot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* By-solution breakdown row */
  .opA-break {
    display: grid;
    grid-template-columns: 200px 1fr 60px;
    align-items: center;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 12.5px;
  }
  .opA-break:last-child { border-bottom: 0; }
  .opA-break-name {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    color: var(--ink);
  }
  .opA-break-name .sw {
    width: 12px; height: 12px; border-radius: 3px;
  }
  .opA-break-stack {
    display: flex;
    height: 14px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .opA-break-stack span { height: 100%; }
  .opA-break-total {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    text-align: right;
    font-weight: 600;
  }

  /* ═══════════════════════════════════════════════════════════
     OPTION B — Per-solution swimlanes
     ═══════════════════════════════════════════════════════════ */
  .opB { padding: 0; }
  .opB-row {
    display: grid;
    grid-template-columns: 220px 1fr 80px;
    align-items: center;
    gap: 18px;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .opB-row:last-child { border-bottom: 0; }
  .opB-row-sol {
    display: flex; align-items: center; gap: 12px;
  }
  .opB-row-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: grid; place-items: center;
    color: #fff;
    flex-shrink: 0;
  }
  .opB-row-icon svg { width: 18px; height: 18px; }
  .opB-row-icon.red { background: var(--red); }
  .opB-row-icon.yellow { background: var(--gold); color: var(--gold-deep); }
  .opB-row-icon.blue { background: #1F6FCC; }
  .opB-row-icon.green { background: var(--ok); }
  .opB-row-name {
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .opB-row-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .opB-stages {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    gap: 6px;
  }
  .opB-stage {
    padding: 10px 12px;
    background: var(--cream-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; flex-direction: column; gap: 4px;
    position: relative;
  }
  .opB-stage.btl {
    background: linear-gradient(180deg, rgba(240,192,64,0.18), rgba(240,192,64,0.04));
    border-color: rgba(240,192,64,0.45);
  }
  .opB-stage-n {
    font-family: 'Sora', sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    line-height: 1.1;
  }
  .opB-stage.btl .opB-stage-n { color: var(--gold-deep); }
  .opB-stage-v {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .opB-row-total {
    text-align: right;
    font-family: 'Sora', sans-serif;
  }
  .opB-row-total-v {
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .opB-row-total-l {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ═══════════════════════════════════════════════════════════
     OPTION C — Hybrid with view toggle
     ═══════════════════════════════════════════════════════════ */
  .opC-toggle {
    display: inline-flex;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .opC-toggle button {
    padding: 5px 12px;
    border-radius: 6px;
    font-family: 'Sora', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--ink-2);
    background: transparent;
    border: 0;
    cursor: pointer;
  }
  .opC-toggle button.on {
    background: #fff;
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .opC-summary {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    margin-bottom: 0;
    border-bottom: 1px solid var(--border);
  }
  .opC-sum-cell {
    background: #fff;
    padding: 18px 22px;
  }
  .opC-sum-cell.lead {
    background: linear-gradient(135deg, var(--ink) 0%, #2A2418 100%);
    color: #fff;
  }
  .opC-sum-l {
    font-family: 'Sora', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .opC-sum-cell.lead .opC-sum-l { color: rgba(255,255,255,0.7); }
  .opC-sum-v {
    font-family: 'Sora', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .opC-sum-cell.lead .opC-sum-v { color: #fff; }
  .opC-sum-cell.lead .opC-sum-v em {
    font-style: normal;
    color: var(--gold);
    font-weight: 700;
  }
  .opC-sum-d {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .opC-sum-cell.lead .opC-sum-d { color: rgba(255,255,255,0.7); }

  .opC-lanes { padding: 0; }

  /* ═══════════════════════════════════════════════════════════
     Notes
     ═══════════════════════════════════════════════════════════ */
  .design-notes {
    background: #FCFBF8;
    border: 1px solid #E5DFD3;
    color: #1A1814;
    padding: 40px 48px;
    line-height: 1.55;
    border-radius: 4px;
    width: 1200px;
    font-family: 'DM Sans', sans-serif;
  }
  .design-notes h1 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin: 0 0 10px;
  }
  .design-notes h1 em { font-style: italic; color: #C0392B; }
  .design-notes .lead {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 17px;
    color: #3D3830;
    max-width: 820px;
    margin-bottom: 22px;
  }
  .design-notes h2 {
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8A6500;
    font-weight: 700;
    margin: 24px 0 10px;
    padding-top: 18px;
    border-top: 1px solid #E5DFD3;
  }
  .design-notes h2:first-of-type { padding-top: 0; border-top: 0; margin-top: 0; }
  .design-notes p {
    font-size: 14px;
    color: #3D3830;
    margin: 0 0 10px;
    max-width: 880px;
  }
  .design-notes strong { color: #1A1814; font-weight: 600; }
  .design-notes .grid3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    margin-top: 4px;
  }
  .design-notes .grid3 .col {
    padding-top: 16px;
    border-top: 2px solid #1A1814;
  }
  .design-notes .grid3 .num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #8A8170;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .design-notes .grid3 .h {
    font-family: 'Source Serif 4', serif;
    font-size: 19px;
    font-weight: 500;
    color: #1A1814;
    line-height: 1.25;
    margin-bottom: 10px;
  }
  .design-notes .grid3 .d {
    font-size: 13px;
    color: #3D3830;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="approval-flow-content.jsx"></script>
</body>
</html>
