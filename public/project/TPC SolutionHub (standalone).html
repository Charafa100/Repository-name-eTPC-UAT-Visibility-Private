{ background: #F97316; }\n.month-bar .stack.transport { background: #2563EB; }\n.month-bar .stack.fuel      { background: #DC2626; }\n.month-bar .stack.lodging   { background: #7C3AED; }\n.month-bar .stack.comms     { background: #059669; }\n.month-bar .stack.supplies  { background: #D97706; }\n.month-bar .stack.other     { background: #6B7280; }\n.month-axis {\n  display: flex;\n  gap: 4px;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--text-4);\n  letter-spacing: 0.3px;\n  text-transform: uppercase;\n}\n.month-axis span { flex: 1; text-align: center; }\n.month-legend {\n  display: flex;\n  flex-wrap: wrap;\n  gap: var(--s-4);\n  margin-top: var(--s-4);\n  padding-top: var(--s-4);\n  border-top: 1px solid var(--border);\n  font-size: 11px;\n}\n.month-legend-item { display: inline-flex; align-items: center; gap: 6px; color: var(--text-2); }\n.month-legend-item .amt {\n  font-family: var(--font-mono);\n  color: var(--text);\n  font-weight: 600;\n  margin-left: 4px;\n}\n\n/* ============== EXPENSE ROW ============== */\n.expense-list {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n}\n.expense-row {\n  display: grid;\n  grid-template-columns: 40px 1fr 160px 140px 110px auto;\n  gap: var(--s-4);\n  padding: 12px var(--s-5);\n  border-bottom: 1px solid var(--border);\n  align-items: center;\n  cursor: pointer;\n}\n.expense-row:hover { background: var(--surface-2); }\n.expense-row:last-child { border-bottom: none; }\n.expense-row .ex-icon {\n  width: 40px; height: 40px;\n  border-radius: var(--r-md);\n  display: grid;\n  place-items: center;\n  background: var(--surface-3);\n  color: var(--text-2);\n}\n.expense-row .ex-icon.meals     { background: #FFF4E5; color: #B45309; }\n.expense-row .ex-icon.transport { background: #EFF8FF; color: #175CD3; }\n.expense-row .ex-icon.fuel      { background: #FEF3F2; color: #B42318; }\n.expense-row .ex-icon.lodging   { background: #F4F3FF; color: #5925DC; }\n.expense-row .ex-icon.comms     { background: #ECFDF3; color: #027A48; }\n.expense-row .ex-icon.supplies  { background: #FEF7E0; color: #92400E; }\n[data-theme=\"dark\"] .expense-row .ex-icon.meals     { background: #2A1B0A; color: #FDBA74; }\n[data-theme=\"dark\"] .expense-row .ex-icon.transport { background: #0E1F38; color: #93C5FD; }\n[data-theme=\"dark\"] .expense-row .ex-icon.fuel      { background: #2B1414; color: #FCA5A5; }\n[data-theme=\"dark\"] .expense-row .ex-icon.lodging   { background: #1F1B2E; color: #C4B5FD; }\n[data-theme=\"dark\"] .expense-row .ex-icon.comms     { background: #0E2419; color: #6EE7B7; }\n[data-theme=\"dark\"] .expense-row .ex-icon.supplies  { background: #2B2412; color: #FCD34D; }\n.expense-row .ex-icon svg { width: 18px; height: 18px; }\n\n.expense-row .ex-info {\n  display: flex;\n  flex-direction: column;\n  gap: 2px;\n  min-width: 0;\n}\n.expense-row .ex-title {\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--text);\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n.expense-row .ex-sub {\n  font-size: 11px;\n  color: var(--text-3);\n  font-family: var(--font-mono);\n  letter-spacing: 0.3px;\n}\n.expense-row .ex-cat { font-size: 12px; }\n.expense-row .ex-date {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text-2);\n}\n.expense-row .ex-amt {\n  font-family: var(--font-mono);\n  font-size: 14px;\n  font-weight: 600;\n  color: var(--text);\n  text-align: right;\n  letter-spacing: -0.2px;\n}\n.expense-row .ex-amt .ccy { font-size: 10px; color: var(--text-3); margin-left: 3px; font-weight: 500; }\n\n.expense-list-head {\n  padding: var(--s-3) var(--s-5);\n  background: var(--surface-2);\n  border-bottom: 1px solid var(--border);\n  display: grid;\n  grid-template-columns: 40px 1fr 160px 140px 110px auto;\n  gap: var(--s-4);\n  align-items: center;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  font-weight: 500;\n}\n\n/* ============== EXPENSE CATEGORY TILES (form) ============== */\n.cat-tile-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));\n  gap: var(--s-2);\n}\n.cat-tile {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 6px;\n  padding: var(--s-4) var(--s-3);\n  border: 1.5px solid var(--border);\n  border-radius: var(--r-md);\n  background: var(--surface);\n  cursor: pointer;\n  text-align: center;\n  transition: border-color 0.12s, background 0.12s;\n}\n.cat-tile:hover { border-color: var(--border-strong); }\n.cat-tile.selected { border-color: var(--accent); background: var(--accent-soft); }\n.cat-tile .tile-bubble {\n  width: 36px; height: 36px;\n  border-radius: 50%;\n  display: grid;\n  place-items: center;\n  flex-shrink: 0;\n}\n.cat-tile .tile-bubble svg { width: 18px; height: 18px; }\n.cat-tile .tile-bubble.meals     { background: #FFF4E5; color: #B45309; }\n.cat-tile .tile-bubble.transport { background: #EFF8FF; color: #175CD3; }\n.cat-tile .tile-bubble.fuel      { background: #FEF3F2; color: #B42318; }\n.cat-tile .tile-bubble.lodging   { background: #F4F3FF; color: #5925DC; }\n.cat-tile .tile-bubble.comms     { background: #ECFDF3; color: #027A48; }\n.cat-tile .tile-bubble.supplies  { background: #FEF7E0; color: #92400E; }\n.cat-tile .tile-bubble.other     { background: var(--surface-3); color: var(--text-2); }\n[data-theme=\"dark\"] .cat-tile .tile-bubble.meals     { background: #2A1B0A; color: #FDBA74; }\n[data-theme=\"dark\"] .cat-tile .tile-bubble.transport { background: #0E1F38; color: #93C5FD; }\n[data-theme=\"dark\"] .cat-tile .tile-bubble.fuel      { background: #2B1414; color: #FCA5A5; }\n[data-theme=\"dark\"] .cat-tile .tile-bubble.lodging   { background: #1F1B2E; color: #C4B5FD; }\n[data-theme=\"dark\"] .cat-tile .tile-bubble.comms     { background: #0E2419; color: #6EE7B7; }\n[data-theme=\"dark\"] .cat-tile .tile-bubble.supplies  { background: #2B2412; color: #FCD34D; }\n.cat-tile .tile-name {\n  font-size: 12px;\n  font-weight: 500;\n  color: var(--text);\n}\n\n/* ============== STATUS PILLS (expense) ============== */\n.ex-status {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 2px 8px;\n  border-radius: 4px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.4px;\n  text-transform: uppercase;\n}\n.ex-status.draft       { background: var(--surface-3); color: var(--text-3); }\n.ex-status.submitted   { background: var(--info-soft); color: var(--info); }\n.ex-status.approved    { background: var(--accent-soft); color: var(--accent); }\n.ex-status.reimbursed  { background: var(--success-soft); color: var(--success); }\n.ex-status.rejected    { background: var(--danger-soft); color: var(--danger); }\n\n/* ============== REIMBURSE STRIP ============== */\n.reimb-strip {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 1px;\n  background: var(--border);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n  margin-bottom: var(--s-5);\n}\n.reimb-cell {\n  background: var(--surface);\n  padding: var(--s-4) var(--s-5);\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  position: relative;\n}\n.reimb-cell .l {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  font-weight: 500;\n}\n.reimb-cell .v {\n  font-family: var(--font-mono);\n  font-size: 24px;\n  font-weight: 600;\n  color: var(--text);\n  letter-spacing: -0.4px;\n  line-height: 1;\n}\n.reimb-cell .v .ccy { font-size: 10px; color: var(--text-3); margin-left: 3px; font-weight: 500; }\n.reimb-cell .s {\n  font-size: 11px;\n  color: var(--text-3);\n}\n<\u002Fstyle>\n<style>/* TPC SolutionHub — Security Escort (E85) module */\n\n/* ============== RISK LEVELS ============== */\n.risk-pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 2px 9px;\n  border-radius: 4px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  border: 1px solid;\n}\n.risk-pill::before {\n  content: '';\n  width: 6px; height: 6px;\n  background: currentColor;\n}\n.risk-low      { background: var(--success-soft); color: var(--success); border-color: var(--success-tint); }\n.risk-standard { background: var(--info-soft);    color: var(--info);    border-color: var(--info-tint); }\n.risk-elevated { background: var(--warning-soft); color: var(--warning); border-color: var(--warning-tint); }\n.risk-high     { background: var(--danger-soft);  color: var(--danger);  border-color: var(--danger-tint); }\n.risk-restricted {\n  background: #0B0E12; color: #FFB81C; border-color: #0B0E12;\n}\n\n.risk-bar {\n  display: flex;\n  gap: 2px;\n  width: 80px;\n}\n.risk-bar .seg {\n  flex: 1;\n  height: 6px;\n  background: var(--border);\n  border-radius: 1px;\n}\n.risk-bar .seg.on.r1 { background: var(--success); }\n.risk-bar .seg.on.r2 { background: var(--info); }\n.risk-bar .seg.on.r3 { background: var(--warning); }\n.risk-bar .seg.on.r4 { background: var(--danger); }\n.risk-bar .seg.on.r5 { background: #0B0E12; }\n\n/* ============== ROUTE CARD ============== */\n.escort-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  padding: var(--s-5);\n  display: grid;\n  grid-template-columns: 1fr 320px;\n  gap: var(--s-5);\n  cursor: pointer;\n  transition: border-color 0.12s, box-shadow 0.12s;\n}\n.escort-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }\n\n.escort-card-head {\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  gap: var(--s-3);\n  margin-bottom: var(--s-3);\n}\n.escort-card-id {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-3);\n  letter-spacing: 0.5px;\n}\n.escort-card-title {\n  font-size: 14px;\n  font-weight: 600;\n  color: var(--text);\n  margin-top: 2px;\n}\n\n.route-line {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  align-items: center;\n  gap: var(--s-3);\n  margin-top: var(--s-3);\n  margin-bottom: var(--s-3);\n}\n.route-endpoint {\n  text-align: center;\n  font-size: 12px;\n}\n.route-endpoint .pin {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  background: var(--surface-3);\n  border: 2px solid var(--border-strong);\n  display: grid;\n  place-items: center;\n  margin: 0 auto 4px;\n  color: var(--text-2);\n  position: relative;\n}\n.route-endpoint .pin svg { width: 14px; height: 14px; }\n.route-endpoint.origin .pin { background: var(--accent); color: #fff; border-color: var(--accent); }\n.route-endpoint.dest .pin   { background: var(--surface); color: var(--text); border-color: var(--text); }\n.route-endpoint .name {\n  font-weight: 600;\n  color: var(--text);\n  white-space: nowrap;\n  font-size: 11px;\n}\n.route-endpoint .time {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-3);\n  letter-spacing: 0.3px;\n  margin-top: 1px;\n}\n\n.route-arrow {\n  position: relative;\n  height: 28px;\n  display: flex;\n  align-items: center;\n}\n.route-arrow::before {\n  content: '';\n  position: absolute;\n  left: 0; right: 0;\n  top: 50%;\n  height: 2px;\n  background: var(--border-strong);\n  background-image: repeating-linear-gradient(\n    90deg,\n    var(--text-3) 0, var(--text-3) 4px,\n    transparent 4px, transparent 9px\n  );\n  background-size: 9px 2px;\n}\n.route-arrow .arrow-info {\n  position: relative;\n  z-index: 1;\n  margin: 0 auto;\n  background: var(--surface);\n  padding: 2px 8px;\n  border-radius: 999px;\n  border: 1px solid var(--border);\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-2);\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n}\n.route-arrow .arrow-info svg { width: 11px; height: 11px; }\n\n.escort-meta {\n  display: flex;\n  flex-wrap: wrap;\n  gap: var(--s-3);\n  font-size: 12px;\n  color: var(--text-3);\n  padding-top: var(--s-3);\n  border-top: 1px solid var(--border);\n}\n.escort-meta .item { display: inline-flex; align-items: center; gap: 4px; }\n.escort-meta .item svg { width: 13px; height: 13px; }\n.escort-meta .item strong { color: var(--text); font-weight: 600; }\n\n/* Right side mini-map preview */\n.escort-mini-map {\n  background: var(--surface-2);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  padding: var(--s-3);\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-2);\n}\n.escort-mini-map .map-canvas {\n  background: var(--surface-3);\n  border-radius: 4px;\n  height: 100px;\n  position: relative;\n  overflow: hidden;\n}\n.escort-mini-map .map-canvas svg { width: 100%; height: 100%; display: block; }\n.escort-mini-map .map-canvas .country {\n  fill: var(--surface);\n  stroke: var(--border-strong);\n  stroke-width: 0.8;\n}\n.escort-mini-map .map-canvas .route {\n  fill: none;\n  stroke: var(--accent);\n  stroke-width: 1.8;\n  stroke-dasharray: 4 2;\n}\n.escort-mini-map .map-canvas .pin {\n  fill: var(--accent);\n  stroke: var(--surface);\n  stroke-width: 1.5;\n}\n.escort-mini-map .map-canvas .pin.end {\n  fill: var(--text);\n}\n\n.escort-mini-map .map-stats {\n  display: flex;\n  justify-content: space-between;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-3);\n}\n.escort-mini-map .map-stats strong { color: var(--text); }\n\n/* ============== ESCORT STATUS ============== */\n.escort-status {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 3px 10px;\n  border-radius: 999px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.4px;\n  text-transform: uppercase;\n}\n.escort-status::before {\n  content: '';\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: currentColor;\n}\n.escort-status.requested { background: var(--info-soft); color: var(--info); }\n.escort-status.planning  { background: var(--warning-soft); color: var(--warning); }\n.escort-status.assigned  { background: var(--accent-soft); color: var(--accent); }\n.escort-status.transit   { background: var(--surface-3); color: var(--text); }\n.escort-status.transit::before { animation: blinker 1.4s infinite; }\n.escort-status.completed { background: var(--success-soft); color: var(--success); }\n.escort-status.cancelled { background: var(--danger-soft); color: var(--danger); }\n@keyframes blinker {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.3; }\n}\n\n/* ============== HERO STATS (escort) ============== */\n.escort-hero {\n  display: grid;\n  grid-template-columns: 2fr 1fr 1fr;\n  gap: 1px;\n  background: var(--border);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n  margin-bottom: var(--s-7);\n}\n.escort-hero-cell {\n  background: var(--surface);\n  padding: var(--s-5) var(--s-6);\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-3);\n}\n.escort-hero-cell .l {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 1px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  font-weight: 500;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n}\n.escort-hero-cell .l svg { width: 12px; height: 12px; }\n.escort-hero-cell .v {\n  font-family: var(--font-mono);\n  font-size: 38px;\n  font-weight: 600;\n  letter-spacing: -1px;\n  color: var(--text);\n  line-height: 1;\n}\n.escort-hero-cell .v.smol { font-size: 24px; }\n.escort-hero-cell .v .unit { font-size: 14px; color: var(--text-3); font-weight: 500; letter-spacing: 0; margin-left: 4px; }\n.escort-hero-cell.transit-cell .v { display: flex; align-items: center; gap: 10px; }\n.escort-hero-cell.transit-cell .live-dot { width: 10px; height: 10px; }\n\n/* Risk distribution mini-chart */\n.risk-dist {\n  display: flex;\n  height: 8px;\n  border-radius: 2px;\n  overflow: hidden;\n  margin-top: 4px;\n}\n.risk-dist span { transition: opacity 0.2s; }\n.risk-dist .r-low { background: var(--success); }\n.risk-dist .r-std { background: var(--info); }\n.risk-dist .r-elev { background: var(--warning); }\n.risk-dist .r-high { background: var(--danger); }\n.risk-dist .r-rest { background: #0B0E12; }\n\n/* ============== FORM SPECIFIC ============== */\n.escort-route-builder {\n  background: var(--surface-2);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  padding: var(--s-4);\n}\n.route-leg {\n  display: grid;\n  grid-template-columns: 28px 1fr 1fr;\n  gap: var(--s-3);\n  align-items: center;\n  padding: 6px 0;\n}\n.route-leg .leg-pin {\n  width: 22px;\n  height: 22px;\n  border-radius: 50%;\n  background: var(--surface);\n  border: 1.5px solid var(--border-strong);\n  display: grid;\n  place-items: center;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 700;\n  color: var(--text-3);\n}\n.route-leg.start .leg-pin { background: var(--accent); border-color: var(--accent); color: #fff; }\n.route-leg.end .leg-pin { background: var(--text); border-color: var(--text); color: var(--surface); }\n\n.risk-picker {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  gap: 4px;\n}\n.risk-tile {\n  padding: 10px 8px;\n  border: 1.5px solid var(--border);\n  border-radius: var(--r-md);\n  background: var(--surface);\n  cursor: pointer;\n  text-align: center;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 6px;\n  transition: border-color 0.12s, background 0.12s;\n}\n.risk-tile:hover { border-color: var(--border-strong); }\n.risk-tile.selected { border-color: var(--accent); background: var(--accent-soft); }\n.risk-tile .swatch {\n  width: 24px; height: 24px;\n  border-radius: 50%;\n}\n.risk-tile.r1 .swatch { background: var(--success); }\n.risk-tile.r2 .swatch { background: var(--info); }\n.risk-tile.r3 .swatch { background: var(--warning); }\n.risk-tile.r4 .swatch { background: var(--danger); }\n.risk-tile.r5 .swatch { background: repeating-linear-gradient(-45deg, var(--tpc-yellow) 0, var(--tpc-yellow) 4px, #0B0E12 4px, #0B0E12 8px); }\n.risk-tile .label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.4px;\n  text-transform: uppercase;\n  color: var(--text-2);\n}\n.risk-tile.selected .label { color: var(--accent); }\n\n/* ============== LIVE TRANSIT BANNER ============== */\n.transit-banner {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: var(--s-4);\n  align-items: center;\n  background: linear-gradient(90deg, rgba(217,45,32,0.08) 0%, var(--surface) 100%);\n  border: 1px solid var(--danger-tint);\n  border-left: 3px solid var(--danger);\n  border-radius: var(--r-md);\n  padding: var(--s-3) var(--s-4);\n  margin-bottom: var(--s-5);\n}\n[data-theme=\"dark\"] .transit-banner { background: linear-gradient(90deg, rgba(217,45,32,0.15) 0%, var(--surface) 100%); }\n.transit-banner .live-marker {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 700;\n  color: var(--danger);\n  letter-spacing: 0.5px;\n}\n.transit-banner .live-marker .dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--danger);\n  animation: blinker 1.4s infinite;\n}\n.transit-banner .info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }\n.transit-banner .info .t1 { font-size: 13px; font-weight: 600; color: var(--text); }\n.transit-banner .info .t2 { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }\n<\u002Fstyle>\n<style>/* =====================================================\n   TPC SolutionHub v4 — Reviewer Toolkit\n   Notifications + Multi-module Approvals\n   ===================================================== */\n\n/* ============== NOTIFICATIONS DROPDOWN ============== */\n.notif-panel {\n  position: fixed;\n  top: calc(32px + 56px + 4px);\n  right: var(--s-5);\n  width: 380px;\n  max-height: calc(100vh - 100px);\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  box-shadow: var(--shadow-lg);\n  z-index: 150;\n  display: none;\n  flex-direction: column;\n  overflow: hidden;\n  animation: notifIn 0.16s ease-out;\n}\n.notif-panel.open { display: flex; }\n@keyframes notifIn {\n  from { opacity: 0; transform: translateY(-6px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n.notif-head {\n  padding: var(--s-3) var(--s-4);\n  border-bottom: 1px solid var(--border);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: var(--s-2);\n}\n.notif-head h3 {\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--text);\n}\n.notif-head .badge { font-family: var(--font-mono); }\n\n.notif-tabs {\n  display: flex;\n  border-bottom: 1px solid var(--border);\n  background: var(--surface-2);\n  padding: 0 var(--s-3);\n  gap: 0;\n}\n.notif-tab {\n  padding: 10px 12px;\n  font-size: 12px;\n  font-weight: 500;\n  color: var(--text-3);\n  border-bottom: 2px solid transparent;\n  position: relative;\n  margin-bottom: -1px;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  gap: 5px;\n}\n.notif-tab:hover { color: var(--text); }\n.notif-tab.active {\n  color: var(--text);\n  border-bottom-color: var(--accent);\n  font-weight: 600;\n}\n.notif-tab .count {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  padding: 1px 6px;\n  border-radius: 999px;\n  background: var(--accent);\n  color: #fff;\n  font-weight: 600;\n}\n.notif-tab.active .count { background: var(--accent); }\n.notif-tab:not(.active) .count { background: var(--surface-3); color: var(--text-3); }\n\n.notif-list {\n  flex: 1;\n  overflow-y: auto;\n}\n.notif-item {\n  display: grid;\n  grid-template-columns: 28px 1fr auto;\n  gap: var(--s-3);\n  padding: 10px var(--s-4);\n  border-bottom: 1px solid var(--border);\n  cursor: pointer;\n  align-items: flex-start;\n  position: relative;\n}\n.notif-item:last-child { border-bottom: none; }\n.notif-item:hover { background: var(--surface-2); }\n.notif-item.unread::after {\n  content: '';\n  position: absolute;\n  left: 6px; top: 18px;\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--accent);\n}\n.notif-item .n-icon {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  background: var(--surface-3);\n  color: var(--text-3);\n  display: grid;\n  place-items: center;\n  flex-shrink: 0;\n}\n.notif-item .n-icon svg { width: 14px; height: 14px; }\n.notif-item .n-icon.success { background: var(--success-soft); color: var(--success); }\n.notif-item .n-icon.warning { background: var(--warning-soft); color: var(--warning); }\n.notif-item .n-icon.danger { background: var(--danger-soft); color: var(--danger); }\n.notif-item .n-icon.info { background: var(--info-soft); color: var(--info); }\n.notif-item .n-icon.accent { background: var(--accent-soft); color: var(--accent); }\n.notif-item .n-body { min-width: 0; }\n.notif-item .n-text {\n  font-size: 12.5px;\n  color: var(--text);\n  line-height: 1.4;\n}\n.notif-item .n-text strong { font-weight: 600; }\n.notif-item .n-text .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-2); }\n.notif-item .n-meta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-4);\n  margin-top: 3px;\n  text-transform: uppercase;\n  letter-spacing: 0.3px;\n}\n.notif-item .n-time {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-4);\n  white-space: nowrap;\n}\n\n.notif-foot {\n  padding: 10px var(--s-4);\n  border-top: 1px solid var(--border);\n  background: var(--surface-2);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  font-size: 12px;\n}\n.notif-foot .link {\n  color: var(--accent);\n  cursor: pointer;\n  font-weight: 500;\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n}\n.notif-foot .link svg { width: 12px; height: 12px; }\n.notif-foot .markread {\n  color: var(--text-3);\n  cursor: pointer;\n  font-size: 11px;\n}\n.notif-foot .markread:hover { color: var(--text); }\n\n.notif-empty {\n  text-align: center;\n  padding: 40px 20px;\n  color: var(--text-4);\n  font-size: 13px;\n}\n.notif-empty svg { width: 32px; height: 32px; margin: 0 auto 12px; display: block; }\n\n/* ============== UNIFIED APPROVALS INBOX ============== */\n.inbox-toolbar {\n  display: flex;\n  gap: var(--s-2);\n  align-items: center;\n  padding: 10px var(--s-5);\n  background: var(--surface-2);\n  border-bottom: 1px solid var(--border);\n  flex-wrap: wrap;\n}\n.inbox-toolbar .bulk-state {\n  font-size: 12px;\n  color: var(--text-3);\n  margin-right: auto;\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n}\n.inbox-toolbar .bulk-state strong { color: var(--text); font-weight: 600; }\n\n.inbox-list {\n  background: var(--surface);\n}\n.inbox-row {\n  display: grid;\n  grid-template-columns: 36px 110px 1fr 200px 130px auto;\n  gap: var(--s-4);\n  padding: 12px var(--s-5);\n  border-bottom: 1px solid var(--border);\n  align-items: center;\n  cursor: pointer;\n  transition: background 0.12s;\n}\n.inbox-row:hover { background: var(--surface-2); }\n.inbox-row:last-child { border-bottom: none; }\n.inbox-row.selected { background: var(--accent-soft); }\n.inbox-row.selected:hover { background: var(--accent-tint); }\n.inbox-row.urgent { box-shadow: inset 3px 0 0 var(--danger); }\n.inbox-row.warn { box-shadow: inset 3px 0 0 var(--warning); }\n\n.inbox-checkbox {\n  width: 18px; height: 18px;\n  border: 1.5px solid var(--border-strong);\n  border-radius: 4px;\n  display: grid;\n  place-items: center;\n  cursor: pointer;\n  transition: all 0.12s;\n  background: var(--surface);\n}\n.inbox-checkbox:hover { border-color: var(--accent); }\n.inbox-checkbox.checked { background: var(--accent); border-color: var(--accent); }\n.inbox-checkbox.checked::after {\n  content: '';\n  width: 10px; height: 6px;\n  border-left: 2px solid white;\n  border-bottom: 2px solid white;\n  transform: rotate(-45deg) translateY(-2px);\n}\n\n.module-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 5px;\n  padding: 3px 9px;\n  border-radius: 4px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.4px;\n  text-transform: uppercase;\n  border: 1px solid;\n  white-space: nowrap;\n}\n.module-badge svg { width: 11px; height: 11px; }\n.module-badge.chemical { background: var(--tpc-red-soft); color: var(--tpc-red); border-color: var(--tpc-red-tint); }\n.module-badge.cash     { background: var(--tpc-yellow-soft); color: #B97800; border-color: var(--tpc-yellow-tint); }\n[data-theme=\"dark\"] .module-badge.cash { color: #FCD34D; }\n.module-badge.expense  { background: var(--info-soft); color: var(--info); border-color: var(--info-tint); }\n.module-badge.escort   { background: var(--success-soft); color: var(--success); border-color: var(--success-tint); }\n\n.inbox-item-info {\n  min-width: 0;\n}\n.inbox-item-title {\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--text);\n  margin-bottom: 2px;\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n.inbox-item-meta {\n  font-size: 11px;\n  color: var(--text-3);\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  flex-wrap: wrap;\n}\n.inbox-item-meta .mono { font-family: var(--font-mono); color: var(--text-2); }\n.inbox-item-meta .sep { color: var(--text-4); }\n\n.inbox-stage-cell {\n  font-size: 12px;\n}\n.inbox-stage-cell .stage-name {\n  font-weight: 500;\n  color: var(--text);\n}\n.inbox-stage-cell .stage-sub {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-4);\n  letter-spacing: 0.3px;\n  text-transform: uppercase;\n  margin-top: 1px;\n}\n\n.inbox-time-cell {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  text-align: right;\n}\n.inbox-time-cell .age-pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 2px 7px;\n  border-radius: 4px;\n  font-weight: 600;\n  letter-spacing: 0.3px;\n}\n.inbox-time-cell .age-pill.normal { background: var(--surface-3); color: var(--text-2); }\n.inbox-time-cell .age-pill.warn { background: var(--warning-soft); color: var(--warning); }\n.inbox-time-cell .age-pill.danger { background: var(--danger-soft); color: var(--danger); }\n.inbox-time-cell .age-sub {\n  font-size: 9px;\n  color: var(--text-4);\n  margin-top: 2px;\n  text-transform: uppercase;\n  letter-spacing: 0.4px;\n}\n\n.inbox-actions { display: flex; gap: 4px; }\n\n/* ============== BULK ACTION BAR ============== */\n.bulk-bar {\n  position: sticky;\n  bottom: var(--s-5);\n  left: 50%;\n  transform: translateX(-50%) translateY(100px);\n  display: inline-flex;\n  align-items: center;\n  gap: var(--s-3);\n  background: var(--text);\n  color: var(--surface);\n  padding: 10px var(--s-5);\n  border-radius: 999px;\n  box-shadow: var(--shadow-lg);\n  z-index: 80;\n  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);\n  font-size: 13px;\n  font-weight: 500;\n}\n.bulk-bar.show { transform: translateX(-50%) translateY(0); }\n.bulk-bar .bulk-count {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  background: var(--accent);\n  color: #fff;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11px;\n}\n.bulk-bar button {\n  padding: 5px 12px;\n  border-radius: 999px;\n  font-size: 12px;\n  font-weight: 600;\n}\n.bulk-bar .b-approve { background: var(--success); color: #fff; }\n.bulk-bar .b-approve:hover { background: #06803F; }\n.bulk-bar .b-reject  { background: rgba(255,255,255,0.1); color: #FCA5A5; }\n.bulk-bar .b-reject:hover { background: rgba(217,45,32,0.3); }\n.bulk-bar .b-clear { background: transparent; color: var(--text-3); font-weight: 400; }\n\n.bulk-bar-wrap {\n  position: sticky;\n  bottom: 0;\n  display: flex;\n  justify-content: center;\n  pointer-events: none;\n  margin-top: -32px;\n}\n.bulk-bar-wrap .bulk-bar { pointer-events: auto; position: relative; bottom: var(--s-5); left: auto; transform: translateY(100px); }\n.bulk-bar-wrap .bulk-bar.show { transform: translateY(0); }\n\n/* Mark-as-checkbox toolbar header */\n.inbox-headrow {\n  display: grid;\n  grid-template-columns: 36px 110px 1fr 200px 130px auto;\n  gap: var(--s-4);\n  padding: 10px var(--s-5);\n  background: var(--surface-2);\n  border-bottom: 1px solid var(--border);\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  font-weight: 500;\n  align-items: center;\n}\n<\u002Fstyle>\n<style>/* =====================================================\n   TPC SolutionHub · v5 redesign overrides\n   Loaded LAST — overrides tpc.css, v2, v3, v4\n   ===================================================== */\n\n:root {\n  /* Brand */\n  --tpc-red:           #C0392B;\n  --tpc-red-hover:     #9D2E22;       /* ~10% darker */\n  --tpc-red-soft:      rgba(192, 57, 43, 0.10);\n  --tpc-red-tint:      rgba(192, 57, 43, 0.22);\n  --tpc-dark:          #1A1A2E;\n  --tpc-dark-2:        #232342;\n  --tpc-gold:          #F0C040;\n  --tpc-gold-deep:     #8A6500;\n  --tpc-gold-soft:     rgba(240, 192, 64, 0.16);\n\n  /* Ivory palette (chrome) */\n  --tpc-cream:         #F4EFE3;       /* sidebar */\n  --tpc-cream-2:       #FDFCFA;       /* topbar + page bg */\n  --tpc-cream-border:  #E8E1D2;\n  --tpc-cream-ink:     #1A1814;\n  --tpc-cream-ink-2:   #5C5443;\n  --tpc-cream-muted:   #8A8170;\n\n  --tpc-surface:       var(--tpc-cream-2);\n  --tpc-border:        var(--tpc-cream-border);\n  --tpc-text-primary:  var(--tpc-cream-ink);\n  --tpc-text-muted:    #6B7280;\n\n  /* System tokens */\n  --bg:                var(--tpc-surface);\n  --surface:           #FFFFFF;\n  --surface-2:         #FAFBFC;\n  --surface-3:         #F0F2F5;\n  --border:            var(--tpc-border);\n  --border-strong:     #D0D5DD;\n  --text:              var(--tpc-text-primary);\n  --text-2:            #475467;\n  --text-3:            var(--tpc-text-muted);\n  --text-4:            #98A2B3;\n  --accent:            var(--tpc-red);\n  --accent-soft:       var(--tpc-red-soft);\n  --accent-tint:       var(--tpc-red-tint);\n\n  --radius:            10px;\n  --r-sm: 6px;\n  --r-md: 8px;\n  --r-lg: 10px;\n  --r-xl: 14px;\n\n  --font-display:      'Sora', 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;\n  --font-body:         'DM Sans', 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;\n  --font-sans:         var(--font-body);\n\n  --topbar-h: 56px;\n}\n\nbody {\n  font-family: var(--font-body);\n  background: var(--tpc-cream-2);\n  color: var(--text);\n}\n\n/* ============== UNIFIED TOPBAR (Ivory) ============== */\n.ops-strip { display: none !important; }\n\n.app { padding-top: 0; }\n\n.topbar.topbar-merged {\n  position: sticky;\n  top: 0;\n  z-index: 60;\n  height: 56px;\n  background: var(--tpc-cream-2);\n  border-bottom: 1px solid var(--tpc-cream-border);\n  color: var(--tpc-cream-ink);\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  padding: 0 20px;\n}\n\n.topbar.topbar-merged .topbar-left,\n.topbar.topbar-merged .topbar-right {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  min-width: 0;\n}\n.topbar.topbar-merged .topbar-left { flex: 0 0 auto; }\n.topbar.topbar-merged .topbar-right { flex: 0 0 auto; margin-left: 0; }\n\n.topbar.topbar-merged .nav-toggle {\n  color: var(--tpc-cream-ink-2);\n  width: 36px; height: 36px;\n  border-radius: 8px;\n}\n.topbar.topbar-merged .nav-toggle:hover { background: var(--tpc-cream); color: var(--tpc-cream-ink); }\n\n/* Brand on left */\n.topbar-brand {\n  display: flex; align-items: center; gap: 10px;\n}\n.topbar-brand-mark {\n  width: 30px; height: 30px;\n  border-radius: 8px;\n  background: var(--tpc-red);\n  color: #fff;\n  display: grid; place-items: center;\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: 11px;\n  letter-spacing: 0;\n  position: relative;\n  overflow: hidden;\n}\n.topbar-brand-mark::after {\n  content: '';\n  position: absolute; left: 0; right: 0; bottom: 0;\n  height: 4px;\n  background: var(--tpc-gold);\n}\n.topbar-brand-mark span {\n  position: relative; z-index: 1;\n  color: #fff;\n  mix-blend-mode: normal;\n}\n.topbar-brand-text {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 15px;\n  color: var(--tpc-cream-ink);\n  letter-spacing: -0.01em;\n}\n\n/* Hide breadcrumb in the merged topbar to keep room for pills */\n.topbar.topbar-merged .breadcrumb { display: none; }\n\n/* Center pills */\n.topbar-pills {\n  display: flex; align-items: center;\n  gap: 6px;\n  margin: 0 auto;\n  flex: 1 1 auto;\n  justify-content: center;\n  min-width: 0;\n}\n.ops-pill {\n  display: inline-flex; align-items: center;\n  gap: 8px;\n  padding: 5px 12px;\n  background: var(--tpc-cream);\n  border: 1px solid var(--tpc-cream-border);\n  border-radius: 999px;\n  font-family: var(--font-body);\n  font-size: 11.5px;\n  line-height: 1;\n  color: var(--tpc-cream-ink-2);\n  white-space: nowrap;\n}\n.ops-pill-lbl {\n  font-size: 10px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--tpc-cream-muted);\n}\n.ops-pill-val {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 12px;\n  color: var(--tpc-cream-ink);\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.ops-pill-val.ok { color: #1F7C3B; }\n.ops-pill-val.warn { color: var(--tpc-gold-deep); }\n.ops-pill-val.danger { color: var(--tpc-red); }\n.ops-pill-val .live-pulse {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: #22C55E;\n  box-shadow: 0 0 0 0 rgba(34,197,94,0.55);\n  animation: tpcPulse 1.8s infinite;\n}\n@keyframes tpcPulse {\n  0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }\n  100% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }\n}\n\n/* Right side controls */\n.topbar.topbar-merged .topbar-clock {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: 12px;\n  color: var(--tpc-cream-ink-2);\n  letter-spacing: 0.02em;\n  font-variant-numeric: tabular-nums;\n  padding-right: 10px;\n  border-right: 1px solid var(--tpc-cream-border);\n  margin-right: 4px;\n}\n.topbar.topbar-merged .topbar-clock strong {\n  color: var(--tpc-cream-ink);\n  font-weight: 600;\n}\n\n.topbar.topbar-merged .lang-btn {\n  background: var(--tpc-cream);\n  border: 1px solid var(--tpc-cream-border);\n  color: var(--tpc-cream-ink-2);\n  border-radius: 8px;\n  padding: 5px 10px;\n  font-size: 11px;\n  font-weight: 600;\n}\n.topbar.topbar-merged .lang-btn:hover { background: #ECE4D2; color: var(--tpc-cream-ink); }\n\n.topbar.topbar-merged .icon-btn {\n  width: 34px; height: 34px;\n  border-radius: 8px;\n  color: var(--tpc-cream-ink-2);\n  background: transparent;\n  border: 0;\n  position: relative;\n  display: grid; place-items: center;\n}\n.topbar.topbar-merged .icon-btn:hover { background: var(--tpc-cream); color: var(--tpc-cream-ink); }\n.topbar.topbar-merged .icon-btn svg { width: 17px; height: 17px; }\n.topbar.topbar-merged .icon-btn .dot {\n  position: absolute; top: 8px; right: 9px;\n  width: 7px; height: 7px;\n  background: var(--tpc-red);\n  border-radius: 50%;\n  border: 2px solid var(--tpc-cream-2);\n}\n\n.topbar.topbar-merged .user-chip {\n  display: flex; align-items: center; gap: 8px;\n  padding: 4px 12px 4px 4px;\n  background: var(--tpc-cream);\n  border: 1px solid var(--tpc-cream-border);\n  border-radius: 999px;\n  color: var(--tpc-cream-ink);\n}\n.topbar.topbar-merged .user-chip:hover { background: #ECE4D2; }\n.topbar.topbar-merged .user-chip .avatar {\n  width: 28px; height: 28px;\n  background: var(--tpc-red);\n  color: #fff;\n  border-radius: 50%;\n  display: grid; place-items: center;\n  font-family: var(--font-display);\n  font-weight: 600; font-size: 11px;\n}\n.topbar.topbar-merged .user-chip-meta {\n  display: flex; flex-direction: column;\n  align-items: flex-start; gap: 0;\n  line-height: 1.15;\n}\n.topbar.topbar-merged .user-chip-name {\n  font-family: var(--font-display);\n  font-size: 12px; font-weight: 600;\n  color: var(--tpc-cream-ink);\n}\n.topbar.topbar-merged .user-chip-role {\n  font-size: 10px;\n  color: var(--tpc-cream-muted);\n}\n\n/* When sidebar is open, the app shell offsets correctly */\n.app { grid-template-columns: 240px 1fr; }\n.app[data-nav=\"collapsed\"] { grid-template-columns: 64px 1fr; }\n\n/* ============== SIDEBAR — Ivory cream ============== */\n.sidebar {\n  background: var(--tpc-cream);\n  border-right: 1px solid var(--tpc-cream-border);\n  color: var(--tpc-cream-ink-2);\n  position: sticky;\n  top: 56px;\n  height: calc(100vh - 56px);\n}\n.sidebar-header {\n  display: none; /* brand lives in topbar now */\n}\n.nav-area {\n  padding: 18px 14px 14px;\n  flex: 1;\n  overflow-y: auto;\n  display: flex; flex-direction: column;\n  gap: 2px;\n}\n.nav-label {\n  font-family: var(--font-display);\n  font-size: 10px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--tpc-gold-deep);\n  font-weight: 700;\n  padding: 14px 8px 6px;\n  margin: 0;\n}\n.nav-label:first-child { padding-top: 4px; }\n\n.nav-item {\n  display: flex; align-items: center;\n  gap: 12px;\n  padding: 9px 12px;\n  border-radius: 8px;\n  font-family: var(--font-body);\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--tpc-cream-ink-2);\n  position: relative;\n  cursor: pointer;\n  background: transparent;\n  transition: background 0.12s, color 0.12s, box-shadow 0.12s;\n}\n.nav-item:hover {\n  background: rgba(255,255,255,0.55);\n  color: var(--tpc-cream-ink);\n}\n.nav-item.active {\n  background: #FFFFFF;\n  color: var(--tpc-cream-ink);\n  font-weight: 600;\n  box-shadow: 0 1px 2px rgba(26,24,20,0.06);\n}\n.nav-item.active::before {\n  content: '';\n  position: absolute;\n  left: -14px; top: 8px; bottom: 8px;\n  width: 3px;\n  background: var(--tpc-red);\n  border-radius: 0 2px 2px 0;\n}\n.nav-icon {\n  width: 18px; height: 18px;\n  display: grid; place-items: center;\n  color: inherit;\n  opacity: 0.85;\n  flex-shrink: 0;\n}\n.nav-item.active .nav-icon { opacity: 1; color: var(--tpc-red); }\n.nav-item .nav-icon svg { width: 17px; height: 17px; }\n\n.nav-badge {\n  margin-left: auto;\n  min-width: 18px; height: 18px;\n  padding: 0 6px;\n  background: var(--tpc-red);\n  color: #fff;\n  border-radius: 999px;\n  font-family: var(--font-display);\n  font-size: 10px;\n  font-weight: 600;\n  display: inline-flex;\n  align-items: center; justify-content: center;\n  line-height: 1;\n}\n\n.role-switcher {\n  margin: 8px 14px 12px;\n  padding: 12px;\n  background: rgba(255,255,255,0.55);\n  border: 1px solid var(--tpc-cream-border);\n  border-radius: 10px;\n}\n.role-switcher-label {\n  font-family: var(--font-display);\n  font-size: 10px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--tpc-gold-deep);\n  font-weight: 700;\n  margin-bottom: 6px;\n}\n.role-select {\n  width: 100%;\n  background: #FFFFFF;\n  border: 1px solid var(--tpc-cream-border);\n  color: var(--tpc-cream-ink);\n  padding: 6px 8px;\n  border-radius: 6px;\n  font-size: 12px;\n  font-family: var(--font-body);\n}\n.role-select option { color: #000; }\n\n.sidebar-footer {\n  padding: 12px 18px;\n  border-top: 1px solid var(--tpc-cream-border);\n  font-size: 11px;\n  color: var(--tpc-cream-muted);\n  display: flex; align-items: center; gap: 8px;\n  font-family: var(--font-body);\n}\n.sidebar-footer .live-dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: #22C55E;\n  box-shadow: 0 0 6px rgba(34,197,94,0.6);\n}\n\n[data-nav=\"collapsed\"] .nav-label { display: none; }\n[data-nav=\"collapsed\"] .nav-item { justify-content: center; padding: 9px 8px; }\n[data-nav=\"collapsed\"] .nav-item .nav-badge { position: absolute; top: 4px; right: 4px; margin-left: 0; }\n[data-nav=\"collapsed\"] .role-switcher, [data-nav=\"collapsed\"] .sidebar-footer { display: none; }\n\n/* ============== HERO / WELCOME CARD ============== */\n.hero {\n  background: #FFFFFF;\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  padding: 28px 32px;\n  box-shadow: 0 1px 2px rgba(16,24,40,0.04);\n  position: relative;\n  overflow: hidden;\n}\n.hero::before, .hero::after { display: none; }\n\n.hero-greeting {\n  font-family: var(--font-body);\n  font-size: 11px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--tpc-text-muted);\n  margin-bottom: 12px;\n  font-weight: 500;\n}\n.hero-title {\n  font-family: var(--font-display);\n  font-size: 28px;\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  line-height: 1.2;\n  color: var(--tpc-text-primary);\n}\n.hero-title .accent,\n.hero-title span[style*=\"color:var(--accent)\"] {\n  color: var(--tpc-red) !important;\n  font-weight: 700;\n}\n.hero-title span[style*=\"color:var(--text-3)\"] {\n  color: var(--tpc-text-muted) !important;\n  font-family: var(--font-body);\n  font-size: 17px;\n  font-weight: 400;\n}\n.hero-meta {\n  display: flex; gap: 18px;\n  margin-top: 18px;\n  font-family: var(--font-body);\n  font-size: 12.5px;\n  color: var(--tpc-text-muted);\n}\n.hero-meta .meta-chip {\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.hero-meta strong { color: var(--tpc-text-primary); font-weight: 600; }\n\n/* Hero aside — donut + 42 KPI */\n.hero-aside {\n  display: flex; align-items: center; gap: 28px;\n}\n.hero-stat {\n  border-left: 1px solid var(--border);\n  padding-left: 24px;\n  text-align: left;\n}\n.hero-stat-val {\n  font-family: var(--font-display);\n  font-size: 48px;\n  font-weight: 800;\n  color: var(--tpc-dark);\n  line-height: 1;\n  letter-spacing: -0.03em;\n  font-feature-settings: 'tnum';\n}\n.hero-stat-lbl {\n  font-family: var(--font-body);\n  font-size: 10px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--tpc-text-muted);\n  font-weight: 600;\n  margin-top: 8px;\n}\n\n/* Donut ring — animated on load */\n.sla-ring .ring-wrap,\n.ring-wrap {\n  animation: tpcRingIn 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) both;\n}\n.ring-wrap .ring-svg { transform-origin: center; }\n.ring-wrap .ring-segment {\n  animation: tpcRingDraw 1.1s cubic-bezier(0.4, 0, 0.2, 1) both;\n  transform-origin: center;\n  transform: rotate(-90deg);\n}\n.ring-wrap .ring-segment:nth-child(2) { animation-delay: 0.05s; }\n.ring-wrap .ring-segment:nth-child(3) { animation-delay: 0.18s; }\n.ring-wrap .ring-segment:nth-child(4) { animation-delay: 0.32s; }\n@keyframes tpcRingIn {\n  from { opacity: 0; transform: scale(0.85); }\n  to   { opacity: 1; transform: scale(1); }\n}\n@keyframes tpcRingDraw {\n  from { stroke-dashoffset: 280; opacity: 0; }\n  to   { stroke-dashoffset: 0; opacity: 1; }\n}\n.ring-center {\n  font-family: var(--font-display) !important;\n  font-weight: 700 !important;\n}\n\n/* ============== APPROVAL FLOW STAGES ============== */\n.flow-card {\n  background: #fff;\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n}\n.flow-stages {\n  display: grid;\n  grid-template-columns: repeat(6, 1fr);\n  gap: 10px;\n  padding: 6px 0;\n}\n.flow-stage {\n  background: var(--tpc-surface);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  padding: 14px 14px 12px;\n  display: flex; flex-direction: column;\n  gap: 8px;\n  position: relative;\n  border-left-width: 1px;\n  transition: transform 0.12s, box-shadow 0.12s;\n}\n.flow-stage:hover {\n  transform: translateY(-1px);\n  box-shadow: 0 2px 6px rgba(16,24,40,0.05);\n}\n.flow-stage-head {\n  display: flex; justify-content: space-between; align-items: baseline;\n}\n.flow-stage-name {\n  font-family: var(--font-display);\n  font-size: 10px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--tpc-text-muted);\n  font-weight: 600;\n}\n.flow-stage-count {\n  font-family: var(--font-display);\n  font-size: 24px;\n  font-weight: 700;\n  color: var(--tpc-text-primary);\n  line-height: 1;\n  letter-spacing: -0.02em;\n}\n.flow-stage-bar {\n  height: 4px;\n  background: var(--surface-3);\n  border-radius: 2px;\n  overflow: hidden;\n  display: flex;\n}\n.flow-stage-bar .seg { height: 100%; transition: width 0.6s cubic-bezier(0.2,0.7,0.2,1); }\n.flow-stage-bar .seg.normal { background: #22C55E; }\n.flow-stage-bar .seg.warn   { background: #F59E0B; }\n.flow-stage-bar .seg.danger { background: var(--tpc-red); }\n.flow-stage-meta {\n  font-family: var(--font-body);\n  font-size: 11px;\n  color: var(--tpc-text-muted);\n}\n\n/* Bottleneck — gold accent */\n.flow-stage.bottleneck {\n  border-left: 3px solid var(--tpc-gold);\n  background: linear-gradient(90deg, var(--tpc-gold-soft) 0%, var(--tpc-surface) 30%);\n  padding-left: 12px;\n}\n.flow-stage.bottleneck .flow-stage-name { color: #8A6500; }\n.flow-stage.bottleneck::after {\n  content: 'BOTTLENECK';\n  position: absolute;\n  top: 8px; right: 10px;\n  font-family: var(--font-display);\n  font-size: 8px;\n  letter-spacing: 0.1em;\n  font-weight: 700;\n  color: #8A6500;\n  background: var(--tpc-gold);\n  padding: 2px 5px;\n  border-radius: 3px;\n}\n\n/* ============== BUTTONS ============== */\n.btn {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 8px 14px;\n  font-family: var(--font-display);\n  font-size: 13px;\n  font-weight: 600;\n  border-radius: 8px;\n  background: #fff;\n  border: 1px solid var(--tpc-border);\n  color: var(--tpc-text-primary);\n  cursor: pointer;\n  transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.06s;\n}\n.btn:hover {\n  background: var(--tpc-surface);\n  border-color: #D0D5DD;\n}\n.btn:active { transform: translateY(0.5px); }\n.btn svg { width: 15px; height: 15px; }\n\n.btn-primary {\n  background: var(--tpc-red);\n  color: #fff;\n  border-color: var(--tpc-red);\n  box-shadow: 0 1px 0 rgba(0,0,0,0.04);\n}\n.btn-primary:hover {\n  background: var(--tpc-red-hover);\n  border-color: var(--tpc-red-hover);\n  color: #fff;\n}\n\n.btn-ghost {\n  background: transparent;\n  border-color: transparent;\n  color: var(--tpc-text-muted);\n}\n.btn-ghost:hover { background: var(--tpc-surface); color: var(--tpc-text-primary); }\n\n.btn-sm { padding: 5px 10px; font-size: 12px; }\n.btn-sm svg { width: 13px; height: 13px; }\n\n/* ============== KPI cards ============== */\n.kpi, .stat, .card {\n  border-radius: var(--radius);\n  border-color: var(--border);\n}\n.kpi-label, .stat-label {\n  font-family: var(--font-body);\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--tpc-text-muted);\n  font-weight: 600;\n}\n.kpi-value, .stat-value {\n  font-family: var(--font-display);\n  font-weight: 700;\n  color: var(--tpc-dark);\n  letter-spacing: -0.02em;\n}\n.card-title, .section-title, .page-title {\n  font-family: var(--font-display);\n  font-weight: 600;\n  color: var(--tpc-text-primary);\n  letter-spacing: -0.01em;\n}\n.page-title { font-weight: 700; }\n\n/* ============== Badges ============== */\n.badge {\n  font-family: var(--font-display);\n  font-weight: 600;\n  border-radius: 999px;\n}\n\n/* ============== MOBILE — bottom nav <768px ============== */\n@media (max-width: 767px) {\n  .app, .app[data-nav=\"collapsed\"] {\n    grid-template-columns: 1fr;\n  }\n  .topbar.topbar-merged {\n    padding: 0 12px;\n    gap: 8px;\n  }\n  .topbar-pills { display: none; }\n  .topbar-brand-text { display: none; }\n  .topbar.topbar-merged .topbar-clock { display: none; }\n  .topbar.topbar-merged .lang-btn,\n  .topbar.topbar-merged #tweaks-btn,\n  .topbar.topbar-merged #theme-btn { display: none; }\n  .topbar.topbar-merged .user-chip-meta { display: none; }\n  .topbar.topbar-merged .user-chip {\n    padding: 3px; gap: 0;\n  }\n\n  .sidebar {\n    position: fixed;\n    top: auto; bottom: 0; left: 0; right: 0;\n    height: 64px;\n    width: 100%;\n    border-right: 0;\n    border-top: 1px solid rgba(255,255,255,0.08);\n    box-shadow: 0 -4px 16px rgba(0,0,0,0.18);\n    z-index: 70;\n    flex-direction: row;\n  }\n  .sidebar > .nav-area {\n    flex-direction: row;\n    flex: 1;\n    padding: 0;\n    gap: 0;\n    overflow-x: auto;\n    overflow-y: hidden;\n    justify-content: space-around;\n  }\n  .nav-label,\n  .role-switcher,\n  .sidebar-footer,\n  .nav-toggle { display: none; }\n\n  .nav-item {\n    flex: 1 0 0;\n    flex-direction: column;\n    justify-content: center;\n    gap: 3px;\n    padding: 8px 4px;\n    border-radius: 0;\n    font-size: 9.5px;\n    font-weight: 500;\n    text-align: center;\n    min-width: 0;\n  }\n  .nav-item span:not(.nav-icon):not(.nav-badge) {\n    font-size: 9.5px;\n    overflow: hidden;\n    text-overflow: ellipsis;\n    white-space: nowrap;\n    max-width: 100%;\n  }\n  .nav-item.active { background: var(--tpc-red-soft); }\n  .nav-item.active::before {\n    left: 50%;\n    top: -1px;\n    bottom: auto;\n    transform: translateX(-50%);\n    width: 32px; height: 3px;\n    border-radius: 0 0 3px 3px;\n  }\n  .nav-badge {\n    position: absolute;\n    top: 4px; right: 50%;\n    margin-right: -22px;\n    margin-left: 0;\n  }\n\n  /* Make room above bottom nav */\n  .content { padding-bottom: 80px; }\n\n  /* Hide tertiary nav items that don't fit */\n  .nav-item[data-page=\"users\"],\n  .nav-item[data-page=\"settings\"] { display: none; }\n\n  /* Hero responsive */\n  .hero {\n    flex-direction: column;\n    padding: 20px;\n    align-items: flex-start;\n  }\n  .hero-title { font-size: 22px; }\n  .hero-stat-val { font-size: 36px; }\n  .hero-aside {\n    border-top: 1px solid var(--border);\n    padding-top: 18px;\n    margin-top: 4px;\n    width: 100%;\n  }\n  .hero-stat { border-left: 0; padding-left: 0; }\n\n  .flow-stages { grid-template-columns: repeat(2, 1fr); }\n}\n\n/* ============== Hub Approval Flow (cross-solution, Option C) ============== */\n.flow-card .flow-stages {\n  display: block !important;\n  grid-template-columns: none !important;\n  gap: 0 !important;\n}\n\n.hubflow-summary {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 1px;\n  background: var(--tpc-cream-border);\n  border: 1px solid var(--tpc-cream-border);\n  border-radius: 10px;\n  overflow: hidden;\n  margin-bottom: 14px;\n}\n.hubflow-phase {\n  background: #fff;\n  padding: 14px 16px;\n  display: flex; flex-direction: column; gap: 8px;\n  min-height: 130px;\n  position: relative;\n}\n.hubflow-phase.btl {\n  background: linear-gradient(180deg, rgba(240,192,64,0.14), rgba(240,192,64,0.04));\n}\n.hubflow-phase-l {\n  display: flex; align-items: center; justify-content: space-between;\n}\n.hubflow-phase-name {\n  font-family: var(--font-display);\n  font-size: 10px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--tpc-cream-muted);\n  font-weight: 700;\n}\n.hubflow-phase.btl .hubflow-phase-name { color: var(--tpc-gold-deep); }\n.hubflow-phase-tag {\n  font-family: var(--font-display);\n  font-size: 9px;\n  padding: 2px 6px;\n  background: var(--tpc-gold);\n  color: var(--tpc-cream-ink);\n  border-radius: 4px;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n}\n.hubflow-phase-v {\n  font-family: var(--font-display);\n  font-size: 30px;\n  font-weight: 800;\n  color: var(--tpc-dark);\n  line-height: 1;\n  letter-spacing: -0.02em;\n}\n.hubflow-phase-bar {\n  display: flex;\n  height: 6px;\n  background: var(--tpc-cream);\n  border-radius: 3px;\n  overflow: hidden;\n}\n.hubflow-phase-bar span { height: 100%; display: block; }\n.hubflow-phase-leg {\n  display: flex; gap: 10px;\n  font-family: 'IBM Plex Mono', monospace;\n  font-size: 10.5px;\n  color: var(--tpc-cream-ink-2);\n  flex-wrap: wrap;\n}\n.hubflow-leg-dot {\n  display: inline-block;\n  width: 6px; height: 6px; border-radius: 50%;\n  margin-right: 4px; vertical-align: middle;\n}\n\n/* Lanes */\n.hubflow-lanes {\n  border: 1px solid var(--tpc-cream-border);\n  border-radius: 10px;\n  overflow: hidden;\n  background: #fff;\n}\n.hubflow-lane {\n  display: grid;\n  grid-template-columns: 220px 1fr 80px;\n  align-items: center;\n  gap: 18px;\n  padding: 14px 18px;\n  border-bottom: 1px solid var(--tpc-cream-border);\n}\n.hubflow-lane:last-child { border-bottom: 0; }\n.hubflow-lane-sol {\n  d
