  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-strong: #D0D5DD;\n\n  /* Text */\n  --text: #101828;\n  --text-2: #475467;\n  --text-3: #667085;\n  --text-4: #98A2B3;\n\n  /* Brand */\n  --tpc-red: #C8102E;\n  --tpc-red-soft: #FEF2F4;\n  --tpc-red-tint: #FCE7EA;\n  --tpc-yellow: #E5A50A;\n  --tpc-yellow-soft: #FEF7E0;\n  --tpc-yellow-tint: #FCEDB8;\n  --accent: var(--tpc-red);\n  --accent-soft: var(--tpc-red-soft);\n  --accent-tint: var(--tpc-red-tint);\n\n  /* Semantic */\n  --success: #079455;\n  --success-soft: #ECFDF3;\n  --success-tint: #D1FADF;\n  --warning: #DC6803;\n  --warning-soft: #FFFAEB;\n  --warning-tint: #FEF0C7;\n  --danger: #D92D20;\n  --danger-soft: #FEF3F2;\n  --danger-tint: #FEE4E2;\n  --info: #175CD3;\n  --info-soft: #EFF8FF;\n  --info-tint: #D1E9FF;\n\n  /* Type */\n  --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;\n  --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;\n\n  /* Spacing scale */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 20px;\n  --s-6: 24px;\n  --s-7: 32px;\n  --s-8: 40px;\n  --s-9: 48px;\n  --s-10: 64px;\n\n  /* Radius */\n  --r-sm: 4px;\n  --r-md: 6px;\n  --r-lg: 8px;\n  --r-xl: 12px;\n\n  /* Shadows */\n  --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.04);\n  --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);\n  --shadow-md: 0 4px 8px -2px rgba(16, 24, 40, 0.08), 0 2px 4px -2px rgba(16, 24, 40, 0.04);\n  --shadow-lg: 0 12px 24px -8px rgba(16, 24, 40, 0.16), 0 4px 8px -4px rgba(16, 24, 40, 0.08);\n\n  /* Layout */\n  --sidebar-w: 240px;\n  --sidebar-w-collapsed: 64px;\n  --topbar-h: 56px;\n  --density: 1;\n}\n\n[data-theme=\"dark\"] {\n  --bg: #0B0E12;\n  --surface: #13171E;\n  --surface-2: #181D26;\n  --surface-3: #1F252F;\n  --border: #2A313D;\n  --border-strong: #3A4250;\n  --text: #F2F4F7;\n  --text-2: #C3CCD9;\n  --text-3: #98A2B3;\n  --text-4: #6B7280;\n  --tpc-red-soft: #2B1418;\n  --tpc-red-tint: #3D1A1F;\n  --tpc-yellow-soft: #2B2412;\n  --tpc-yellow-tint: #3D3217;\n  --success-soft: #0F2419;\n  --success-tint: #133324;\n  --warning-soft: #2A1E0C;\n  --warning-tint: #3A2912;\n  --danger-soft: #2B1418;\n  --danger-tint: #3D1A1F;\n  --info-soft: #0E1F38;\n  --info-tint: #122849;\n  --accent-soft: var(--tpc-red-soft);\n  --accent-tint: var(--tpc-red-tint);\n  --shadow-xs: 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-sm: 0 1px 3px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);\n  --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.5);\n  --shadow-lg: 0 12px 32px -8px rgba(0,0,0,0.7);\n}\n\n/* Accent variants */\n[data-accent=\"yellow\"] {\n  --accent: #B97800;\n  --accent-soft: var(--tpc-yellow-soft);\n  --accent-tint: var(--tpc-yellow-tint);\n}\n[data-accent=\"neutral\"] {\n  --accent: #344054;\n  --accent-soft: #F2F4F7;\n  --accent-tint: #E4E7EC;\n}\n[data-theme=\"dark\"][data-accent=\"neutral\"] {\n  --accent: #98A2B3;\n  --accent-soft: #1F252F;\n  --accent-tint: #2A313D;\n}\n\n/* Density */\n[data-density=\"compact\"] {\n  --density: 0.85;\n}\n\n/* ============== BASE ============== */\nhtml, body { height: 100%; }\n\nbody {\n  font-family: var(--font-sans);\n  font-size: 14px;\n  line-height: 1.5;\n  color: var(--text);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  font-feature-settings: 'cv11', 'ss01';\n  text-rendering: optimizeLegibility;\n}\n\nbutton { font: inherit; color: inherit; cursor: pointer; background: none; border: none; }\ninput, select, textarea { font: inherit; color: inherit; }\na { color: var(--accent); text-decoration: none; }\na:hover { text-decoration: underline; }\n\n.mono { font-family: var(--font-mono); font-feature-settings: 'zero'; }\n\n/* ============== APP SHELL ============== */\n.app {\n  display: grid;\n  grid-template-columns: var(--sidebar-w) 1fr;\n  min-height: 100vh;\n  background: var(--bg);\n}\n\n.app[data-nav=\"collapsed\"] {\n  grid-template-columns: var(--sidebar-w-collapsed) 1fr;\n}\n\n/* ============== SIDEBAR ============== */\n.sidebar {\n  background: var(--surface);\n  border-right: 1px solid var(--border);\n  display: flex;\n  flex-direction: column;\n  position: sticky;\n  top: 32px;\n  height: calc(100vh - 32px);\n  overflow: hidden;\n}\n\n.sidebar-header {\n  height: var(--topbar-h);\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  padding: 0 var(--s-4);\n  border-bottom: 1px solid var(--border);\n  flex-shrink: 0;\n}\n\n.brand-mark {\n  width: 28px;\n  height: 28px;\n  border-radius: 6px;\n  background: var(--text);\n  color: var(--surface);\n  display: grid;\n  place-items: center;\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 11px;\n  letter-spacing: -0.5px;\n  flex-shrink: 0;\n  position: relative;\n  overflow: hidden;\n}\n.brand-mark::after {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: linear-gradient(180deg, transparent 50%, var(--tpc-red) 50%, var(--tpc-red) 75%, var(--tpc-yellow) 75%);\n  opacity: 0.95;\n}\n.brand-mark span {\n  position: relative;\n  z-index: 1;\n  color: #fff;\n  mix-blend-mode: difference;\n}\n\n.brand-text {\n  display: flex;\n  flex-direction: column;\n  line-height: 1.15;\n  min-width: 0;\n}\n.brand-name {\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--text);\n  letter-spacing: -0.1px;\n}\n.brand-sub {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-4);\n  letter-spacing: 0.5px;\n}\n\n[data-nav=\"collapsed\"] .brand-text,\n[data-nav=\"collapsed\"] .nav-label,\n[data-nav=\"collapsed\"] .nav-item span:not(.nav-icon):not(.nav-badge),\n[data-nav=\"collapsed\"] .role-switcher,\n[data-nav=\"collapsed\"] .sidebar-footer {\n  display: none;\n}\n\n.nav-area {\n  flex: 1;\n  overflow-y: auto;\n  padding: var(--s-3) var(--s-2);\n}\n\n.nav-label {\n  display: block;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 500;\n  letter-spacing: 1px;\n  text-transform: uppercase;\n  color: var(--text-4);\n  padding: var(--s-4) var(--s-3) var(--s-2);\n}\n\n.nav-item {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  padding: 7px var(--s-3);\n  border-radius: var(--r-md);\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--text-2);\n  cursor: pointer;\n  user-select: none;\n  position: relative;\n  margin-bottom: 1px;\n  white-space: nowrap;\n}\n.nav-item:hover { background: var(--surface-3); color: var(--text); }\n.nav-item.active {\n  background: var(--surface-3);\n  color: var(--text);\n  font-weight: 600;\n}\n.nav-item.active::before {\n  content: '';\n  position: absolute;\n  left: -4px;\n  top: 6px;\n  bottom: 6px;\n  width: 2px;\n  background: var(--accent);\n  border-radius: 2px;\n}\n.nav-item.disabled {\n  opacity: 0.45;\n  cursor: not-allowed;\n}\n.nav-item.disabled:hover { background: transparent; color: var(--text-2); }\n.nav-icon {\n  width: 18px;\n  height: 18px;\n  flex-shrink: 0;\n  display: inline-flex;\n}\n.nav-icon svg { width: 18px; height: 18px; }\n.nav-badge {\n  margin-left: auto;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 600;\n  padding: 1px 6px;\n  border-radius: 10px;\n  background: var(--accent);\n  color: #fff;\n  min-width: 18px;\n  text-align: center;\n}\n\n/* Role switcher in sidebar */\n.role-switcher {\n  border-top: 1px solid var(--border);\n  padding: var(--s-3) var(--s-3);\n  background: var(--surface-2);\n}\n.role-switcher-label {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  letter-spacing: 1px;\n  text-transform: uppercase;\n  color: var(--text-4);\n  margin-bottom: var(--s-2);\n}\n.role-select {\n  width: 100%;\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  padding: 6px var(--s-2);\n  font-size: 12px;\n  color: var(--text);\n  cursor: pointer;\n}\n.role-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }\n\n.sidebar-footer {\n  padding: var(--s-3) var(--s-4);\n  border-top: 1px solid var(--border);\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-4);\n  letter-spacing: 0.5px;\n}\n.live-dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: var(--success);\n  box-shadow: 0 0 0 3px var(--success-soft);\n}\n\n/* ============== MAIN ============== */\n.main {\n  display: flex;\n  flex-direction: column;\n  min-width: 0;\n}\n\n.topbar {\n  height: var(--topbar-h);\n  background: var(--surface);\n  border-bottom: 1px solid var(--border);\n  display: flex;\n  align-items: center;\n  padding: 0 var(--s-5);\n  gap: var(--s-4);\n  position: sticky;\n  top: 0;\n  z-index: 50;\n}\n\n.topbar-left {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  flex: 1;\n  min-width: 0;\n}\n\n.nav-toggle {\n  width: 32px;\n  height: 32px;\n  border-radius: var(--r-md);\n  display: grid;\n  place-items: center;\n  color: var(--text-3);\n}\n.nav-toggle:hover { background: var(--surface-3); color: var(--text); }\n\n.breadcrumb {\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n  font-size: 13px;\n  color: var(--text-3);\n  font-weight: 500;\n  min-width: 0;\n}\n.breadcrumb .crumb { cursor: pointer; }\n.breadcrumb .crumb:hover { color: var(--text); }\n.breadcrumb .current { color: var(--text); }\n.breadcrumb .sep { color: var(--text-4); display: inline-flex; }\n.breadcrumb .sep svg { width: 14px; height: 14px; }\n\n.topbar-search {\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n  background: var(--surface-2);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  padding: 6px var(--s-3);\n  width: 280px;\n  color: var(--text-3);\n  font-size: 12px;\n}\n.topbar-search:hover, .topbar-search:focus-within {\n  border-color: var(--border-strong);\n  background: var(--surface);\n}\n.topbar-search input {\n  background: transparent;\n  border: none;\n  outline: none;\n  font-size: 13px;\n  flex: 1;\n  color: var(--text);\n}\n.topbar-search input::placeholder { color: var(--text-4); }\n.kbd {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  padding: 1px 5px;\n  border: 1px solid var(--border);\n  border-radius: 3px;\n  color: var(--text-4);\n  background: var(--surface);\n}\n\n.topbar-right {\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n}\n\n.icon-btn {\n  width: 34px;\n  height: 34px;\n  border-radius: var(--r-md);\n  display: grid;\n  place-items: center;\n  color: var(--text-3);\n  position: relative;\n}\n.icon-btn:hover { background: var(--surface-3); color: var(--text); }\n.icon-btn .dot {\n  position: absolute;\n  top: 7px; right: 7px;\n  width: 7px; height: 7px;\n  background: var(--accent);\n  border-radius: 50%;\n  border: 2px solid var(--surface);\n}\n\n.lang-btn {\n  display: flex;\n  align-items: center;\n  gap: 4px;\n  height: 30px;\n  padding: 0 var(--s-3);\n  border-radius: var(--r-md);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--text-2);\n  letter-spacing: 0.5px;\n}\n.lang-btn:hover { background: var(--surface-3); color: var(--text); }\n\n.user-chip {\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n  padding: 4px var(--s-3) 4px 4px;\n  border-radius: 999px;\n  border: 1px solid var(--border);\n  font-size: 12px;\n}\n.user-chip:hover { border-color: var(--border-strong); background: var(--surface-3); }\n.avatar {\n  width: 26px;\n  height: 26px;\n  border-radius: 50%;\n  background: var(--surface-3);\n  color: var(--text-2);\n  font-size: 11px;\n  font-weight: 600;\n  display: grid;\n  place-items: center;\n}\n.user-chip-name {\n  font-weight: 600;\n  color: var(--text);\n  font-size: 12px;\n  line-height: 1.1;\n}\n.user-chip-role {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--text-4);\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  line-height: 1.2;\n}\n\n/* ============== CONTENT ============== */\n.content {\n  flex: 1;\n  padding: var(--s-7) var(--s-7);\n  max-width: 1400px;\n  width: 100%;\n  margin: 0 auto;\n}\n\n.page { display: none; animation: pageIn 0.25s ease-out; }\n.page.active { display: block; }\n@keyframes pageIn {\n  from { opacity: 0; transform: translateY(6px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n.page-header {\n  margin-bottom: var(--s-7);\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  gap: var(--s-5);\n}\n.page-title {\n  font-size: 24px;\n  font-weight: 600;\n  letter-spacing: -0.4px;\n  color: var(--text);\n  margin-bottom: 4px;\n  line-height: 1.2;\n}\n.page-subtitle {\n  font-size: 13px;\n  color: var(--text-3);\n}\n.page-meta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.5px;\n  color: var(--text-4);\n  text-transform: uppercase;\n}\n\n.page-actions { display: flex; gap: var(--s-2); }\n\n/* ============== BUTTONS ============== */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 7px 12px;\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  background: var(--surface);\n  color: var(--text);\n  font-size: 13px;\n  font-weight: 500;\n  white-space: nowrap;\n  transition: background 0.12s, border-color 0.12s, color 0.12s;\n}\n.btn:hover { background: var(--surface-3); border-color: var(--border-strong); }\n.btn svg { width: 15px; height: 15px; }\n\n.btn-primary {\n  background: var(--accent);\n  color: #fff;\n  border-color: var(--accent);\n}\n.btn-primary:hover { background: var(--text); border-color: var(--text); color: #fff; }\n\n.btn-ghost {\n  background: transparent;\n  border-color: transparent;\n  color: var(--text-2);\n}\n.btn-ghost:hover { background: var(--surface-3); color: var(--text); border-color: transparent; }\n\n.btn-danger {\n  background: var(--surface);\n  color: var(--danger);\n  border-color: var(--border);\n}\n.btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }\n\n.btn-success {\n  background: var(--surface);\n  color: var(--success);\n  border-color: var(--border);\n}\n.btn-success:hover { background: var(--success-soft); border-color: var(--success); color: var(--success); }\n\n.btn-sm { padding: 4px 8px; font-size: 12px; }\n.btn-sm svg { width: 13px; height: 13px; }\n\n/* ============== STATS ============== */\n.stats-row {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: var(--s-4);\n  margin-bottom: var(--s-7);\n}\n\n.stat {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  padding: var(--s-4) var(--s-5);\n  position: relative;\n}\n.stat-top {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  margin-bottom: var(--s-3);\n}\n.stat-label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  font-weight: 500;\n}\n.stat-icon {\n  width: 24px;\n  height: 24px;\n  display: grid;\n  place-items: center;\n  color: var(--text-3);\n}\n.stat-icon svg { width: 16px; height: 16px; }\n.stat-value {\n  font-size: 28px;\n  font-weight: 600;\n  letter-spacing: -0.5px;\n  color: var(--text);\n  line-height: 1;\n  font-feature-settings: 'tnum', 'lnum';\n}\n.stat-meta {\n  margin-top: 6px;\n  font-size: 12px;\n  color: var(--text-3);\n  display: flex;\n  align-items: center;\n  gap: 4px;\n}\n.stat-meta svg { width: 13px; height: 13px; }\n.stat-meta.up { color: var(--success); }\n.stat-meta.warn { color: var(--warning); }\n.stat-meta.danger { color: var(--danger); }\n\n/* ============== CARDS ============== */\n.card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n}\n.card-head {\n  padding: var(--s-3) var(--s-5);\n  border-bottom: 1px solid var(--border);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: var(--s-3);\n}\n.card-title {\n  font-size: 14px;\n  font-weight: 600;\n  color: var(--text);\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n}\n.card-title svg { width: 16px; height: 16px; color: var(--text-3); }\n.card-actions { display: flex; gap: var(--s-2); align-items: center; }\n.card-body { padding: var(--s-5); }\n.card-body.flush { padding: 0; }\n\n.section-title {\n  font-size: 11px;\n  font-family: var(--font-mono);\n  text-transform: uppercase;\n  letter-spacing: 1px;\n  color: var(--text-3);\n  margin-bottom: var(--s-3);\n  font-weight: 500;\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n}\n\n/* Personal queue */\n.queue-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  margin-bottom: var(--s-7);\n  overflow: hidden;\n}\n.queue-head {\n  padding: var(--s-4) var(--s-5);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  border-bottom: 1px solid var(--border);\n  background: var(--surface-2);\n}\n.queue-head-left {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n}\n.queue-head h2 {\n  font-size: 15px;\n  font-weight: 600;\n  color: var(--text);\n  letter-spacing: -0.1px;\n}\n.queue-head p { font-size: 12px; color: var(--text-3); }\n\n.queue-list { }\n.queue-row {\n  display: grid;\n  grid-template-columns: 36px 1fr auto auto auto;\n  gap: var(--s-4);\n  padding: var(--s-4) var(--s-5);\n  border-bottom: 1px solid var(--border);\n  align-items: center;\n  cursor: pointer;\n  transition: background 0.12s;\n}\n.queue-row:last-child { border-bottom: none; }\n.queue-row:hover { background: var(--surface-2); }\n\n.queue-pill {\n  width: 36px;\n  height: 36px;\n  border-radius: var(--r-md);\n  display: grid;\n  place-items: center;\n  background: var(--accent-soft);\n  color: var(--accent);\n  border: 1px solid var(--accent-tint);\n}\n.queue-pill svg { width: 18px; height: 18px; }\n.queue-pill.warning { background: var(--warning-soft); color: var(--warning); border-color: var(--warning-tint); }\n.queue-pill.info { background: var(--info-soft); color: var(--info); border-color: var(--info-tint); }\n.queue-pill.success { background: var(--success-soft); color: var(--success); border-color: var(--success-tint); }\n\n.queue-main { min-width: 0; }\n.queue-title {\n  font-size: 14px;\n  font-weight: 600;\n  color: var(--text);\n  margin-bottom: 2px;\n}\n.queue-sub {\n  font-size: 12px;\n  color: var(--text-3);\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n}\n.queue-sub .mono { color: var(--text-4); }\n\n.queue-age {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-3);\n  text-align: right;\n}\n.queue-age.urgent { color: var(--danger); font-weight: 600; }\n.queue-age.due { color: var(--warning); }\n\n/* ============== SOLUTIONS GRID ============== */\n.solutions-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: var(--s-4);\n}\n.sol-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  padding: var(--s-5);\n  cursor: pointer;\n  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-3);\n}\n.sol-card:hover {\n  border-color: var(--border-strong);\n  box-shadow: var(--shadow-sm);\n}\n.sol-card.locked {\n  opacity: 0.55;\n  cursor: not-allowed;\n}\n.sol-card.locked:hover { box-shadow: none; transform: none; }\n\n.sol-head {\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  gap: var(--s-3);\n}\n.sol-icon-box {\n  width: 40px;\n  height: 40px;\n  border-radius: var(--r-md);\n  background: var(--surface-3);\n  color: var(--text);\n  display: grid;\n  place-items: center;\n}\n.sol-icon-box svg { width: 20px; height: 20px; }\n.sol-icon-box.red { background: var(--tpc-red-soft); color: var(--tpc-red); }\n.sol-icon-box.yellow { background: var(--tpc-yellow-soft); color: var(--tpc-yellow); }\n.sol-icon-box.blue { background: var(--info-soft); color: var(--info); }\n.sol-icon-box.green { background: var(--success-soft); color urface-2);\n}\n\n/* Workflow stepper (vertical, in aside) */\n.workflow-stepper {\n  padding: var(--s-4);\n}\n.workflow-stepper h3 {\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--text);\n  margin-bottom: var(--s-3);\n}\n.wf-step {\n  display: grid;\n  grid-template-columns: 24px 1fr;\n  gap: var(--s-3);\n  padding-bottom: var(--s-3);\n  position: relative;\n}\n.wf-step:not(:last-child)::after {\n  content: '';\n  position: absolute;\n  left: 11px;\n  top: 24px;\n  bottom: 0;\n  width: 1px;\n  background: var(--border);\n}\n.wf-node {\n  width: 22px;\n  height: 22px;\n  border-radius: 50%;\n  border: 1.5px solid var(--border-strong);\n  background: var(--surface);\n  display: grid;\n  place-items: center;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 600;\n  color: var(--text-3);\n  z-index: 1;\n}\n.wf-step.active .wf-node {\n  background: var(--accent);\n  border-color: var(--accent);\n  color: #fff;\n}\n.wf-step.done .wf-node {\n  background: var(--success);\n  border-color: var(--success);\n  color: #fff;\n}\n.wf-step.done .wf-node svg { width: 12px; height: 12px; }\n.wf-content { padding-top: 1px; }\n.wf-title { font-size: 12px; font-weight: 600; color: var(--text); }\n.wf-step:not(.active):not(.done) .wf-title { color: var(--text-3); }\n.wf-sub { font-size: 11px; color: var(--text-4); margin-top: 1px; }\n\n/* Summary aside */\n.summary-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n}\n.summary-head {\n  padding: var(--s-3) var(--s-4);\n  border-bottom: 1px solid var(--border);\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--text);\n  background: var(--surface-2);\n}\n.summary-body { padding: var(--s-3) var(--s-4); display: flex; flex-direction: column; gap: 8px; }\n.summary-row {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  gap: var(--s-3);\n  font-size: 12px;\n}\n.summary-label { color: var(--text-3); ===== */\n.flex { display: flex; }\n.gap-2 { gap: var(--s-2); }\n.gap-3 { gap: var(--s-3); }\n.items-center { align-items: center; }\n.text-muted { color: var(--text-3); }\n.text-sm { font-size: 12px; }\n.flex-1 { flex: 1; }\n\n/* Scrollbars */\n::-webkit-scrollbar { width: 8px; height: 8px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; border: 2px solid var(--bg); }\n::-webkit-scrollbar-thumb:hover { background: var(--text-4); }\n<\u002Fstyle>\n<style>/* =====================================================\n   TPC SolutionHub v2 — additional components\n   ===================================================== */\n\n/* ============== HERO BANNER (dashboard) ============== */\n.hero {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-xl);\n  padding: var(--s-6) var(--s-7);\n  margin-bottom: var(--s-7);\n  position: relative;\n  overflow: hidden;\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: var(--s-7);\n  align-items: center;\n}\n.hero::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background:\n    linear-gradient(135deg, transparent 60%, var(--accent-soft) 100%);\n  pointer-events: none;\n}\n.hero::after {\n  content: '';\n  position: absolute;\n  right: -80px;\n  top: -40px;\n  width: 260px;\n  height: 260px;\n  border-radius: 50%;\n  background: radial-gradient(circle, var(--tpc-yellow-tint) 0%, transparent 65%);\n  opacity: 0.5;\n  pointer-events: none;\n}\n.hero-content { position: relative; z-index: 1; min-width: 0; }\n.hero-greeting {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 1px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  margin-bottom: 6px;\n}\n.hero-title {\n  font-size: 26px;\n  font-weight: 600;\n  letter-spacing: -0.5px;\n  line-height: 1.15;\n  color: var(--text);\n  margin-bottom: var(--s-2);\n}\n.hero-title .accent { color: var(--accent); }\n.hero-meta {\n  display: flex;\n  align-items: center;\n  gap: var(--s-5);\n  font-size: 13px;\n  color: var(--text-3);\n  flex-wrap: wrap;\n}\n.hero-meta .meta-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n}\n.hero-meta .meta-chip strong { color: var(--text); font-weight: 600; }\n.hero-meta svg { width: 14px; height: 14px; color: var(--text-4); }\n\n.hero-aside {\n  display: flex;\n  gap: var(--s-5);\n  position: relative;\n  z-index: 1;\n  align-items: center;\n}\n\n/* SLA Ring */\n.sla-ring {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n}\n.ring-svg {\n  width: 84px;\n  height: 84px;\n  flex-shrink: 0;\n  transform: rotate(-90deg);\n}\n.ring-track { fill: none; stroke: var(--border); stroke-width: 8; }\n.ring-segment { fill: none; stroke-width: 8; stroke-linecap: butt; transition: stroke-dashoffset 0.6s ease; }\n.ring-center {\n  position: absolute;\n  inset: 0;\n  display: grid;\n  place-items: center;\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 20px;\n  color: var(--text);\n  letter-spacing: -0.5px;\n}\n.ring-wrap { position: relative; width: 84px; height: 84px; }\n.sla-legend {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  font-size: 11px;\n}\n.sla-legend-row { display: flex; align-items: center; gap: 6px; color: var(--text-2); }\n.sla-legend-dot { width: 8px; height: 8px; border-radius: 2px; }\n.sla-legend-row .count { font-family: var(--font-mono); font-weight: 600; color: var(--text); margin-left: auto; }\n\n.hero-stat {\n  text-align: right;\n  border-left: 1px solid var(--border);\n  padding-left: var(--s-5);\n}\n.hero-stat-val {\n  font-size: 28px;\n  font-weight: 600;\n  letter-spacing: -0.6px;\n  color: var(--text);\n  line-height: 1;\n  font-feature-settings: 'tnum', 'lnum';\n}\n.hero-stat-lbl {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  margin-top: 4px;\n}\n\n/* ============== SPARKLINES ============== */\n.sparkline {\n  width: 100%;\n  height: 28px;\n  margin-top: 8px;\n  display: block;\n}\n.sparkline path.line { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }\n.sparkline path.area { fill-opacity: 0.12; stroke: none; }\n.sparkline circle { stroke: var(--surface); stroke-width: 1.5; }\n.spark-up path.line, .spark-up path.area { stroke: var(--success); fill: var(--success); }\n.spark-down path.line, .spark-down path.area { stroke: var(--danger); fill: var(--danger); }\n.spark-flat path.line, .spark-flat path.area { stroke: var(--text-4); fill: var(--text-4); }\n.spark-accent path.line, .spark-accent path.area { stroke: var(--accent); fill: var(--accent); }\n\n/* ============== GHS PICTOGRAMS ============== */\n.ghs {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 36px;\n  height: 36px;\n  transform: rotate(45deg);\n  border: 2px solid var(--danger);\n  background: #fff;\n  box-shadow: 0 1px 2px rgba(0,0,0,0.08);\n  border-radius: 3px;\n  position: relative;\n  flex-shrink: 0;\n}\n.ghs svg {\n  transform: rotate(-45deg);\n  width: 60%;\n  height: 60%;\n  color: #111;\n  stroke: #111;\n  fill: #111;\n}\n.ghs-sm { width: 24px; height: 24px; }\n.ghs-sm svg { width: 60%; height: 60%; }\n.ghs-xs { width: 18px; height: 18px; border-width: 1.5px; }\n.ghs-xs svg { width: 60%; height: 60%; }\n.ghs-stack {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n}\n.ghs-stack.tight { gap: 2px; }\n.ghs-stack.tight .ghs { margin-right: -4px; }\n\n/* ============== SITE ACTIVITY MAP ============== */\n.site-map-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n}\n.site-map-body {\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n}\n.site-map-canvas {\n  background:\n    linear-gradient(180deg, var(--surface-2), var(--surface));\n  border-right: 1px solid var(--border);\n  position: relative;\n  aspect-ratio: 4 / 3;\n  min-height: 240px;\n  padding: var(--s-4);\n}\n.site-map-canvas svg { width: 100%; height: 100%; display: block; }\n.site-map-canvas .country {\n  fill: var(--surface-3);\n  stroke: var(--border-strong);\n  stroke-width: 1;\n}\n.site-map-canvas .river {\n  fill: none;\n  stroke: var(--info);\n  stroke-width: 1;\n  stroke-dasharray: 2 3;\n  opacity: 0.4;\n}\n.site-dot {\n  cursor: pointer;\n}\n.site-dot circle.core {\n  fill: var(--accent);\n  stroke: var(--surface);\n  stroke-width: 2;\n  transition: r 0.15s;\n}\n.site-dot circle.pulse {\n  fill: var(--accent);\n  opacity: 0.3;\n  animation: sitePulse 2.4s ease-out infinite;\n  transform-origin: center;\n}\n@keyframes sitePulse {\n  0% { transform: scale(0.7); opacity: 0.5; }\n  100% { transform: scale(2.4); opacity: 0; }\n}\n.site-dot:hover circle.core { r: 7; }\n.site-dot text {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  font-weight: 600;\n  fill: var(--text);\n  letter-spacing: 0.3px;\n}\n.site-dot text.label-bg { stroke: var(--surface); stroke-width: 3; }\n\n.site-list { padding: var(--s-3); display: flex; flex-direction: column; gap: 2px; }\n.site-row {\n  display: grid;\n  grid-template-columns: 8px 1fr auto auto;\n  gap: var(--s-3);\n  padding: 8px var(--s-3);\n  border-radius: var(--r-md);\n  align-items: center;\n  cursor: pointer;\n}\n.site-row:hover { background: var(--surface-2); }\n.site-row .site-bullet {\n  width: 8px; height: 8px; border-radius: 50%;\n}\n.site-row .site-name { font-size: 13px; font-weight: 500; color: var(--text); }\n.site-row .site-meta { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }\n.site-row .site-load {\n  display: flex; gap: 2px; align-items: center;\n}\n.site-row .site-load .seg {\n  width: 4px; height: 14px; border-radius: 1px;\n  background: var(--border);\n}\n.site-row .site-load .seg.on { background: var(--success); }\n.site-row .site-load .seg.warn { background: var(--warning); }\n.site-row .site-load .seg.danger { background: var(--danger); }\n\n/* ============== DRAWER ============== */\n.drawer-backdrop {\n  position: fixed;\n  inset: 0;\n  background: rgba(16, 24, 40, 0.45);\n  z-index: 250;\n  opacity: 0;\n  pointer-events: none;\n  transition: opacity 0.2s;\n}\n[data-theme=\"dark\"] .drawer-backdrop { background: rgba(0,0,0,0.65); }\n.drawer-backdrop.open { opacity: 1; pointer-events: auto; }\n\n.drawer {\n  position: fixed;\n  top: 0;\n  right: 0;\n  bottom: 0;\n  width: min(520px, 95vw);\n  background: var(--surface);\n  border-left: 1px solid var(--border);\n  box-shadow: var(--shadow-lg);\n  z-index: 260;\n  transform: translateX(100%);\n  transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);\n  display: flex;\n  flex-direction: column;\n}\n.drawer.open { transform: translateX(0); }\n\n.drawer-head {\n  padding: var(--s-4) var(--s-5);\n  border-bottom: 1px solid var(--border);\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n}\n.drawer-head .drawer-id {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-3);\n}\n.drawer-head h2 {\n  font-size: 16px;\n  font-weight: 600;\n  color: var(--text);\n  margin-top: 2px;\n}\n.drawer-head .drawer-close {\n  margin-left: auto;\n  width: 32px; height: 32px;\n  border-radius: var(--r-md);\n  display: grid;\n  place-items: center;\n  color: var(--text-3);\n}\n.drawer-head .drawer-close:hover { background: var(--surface-3); color: var(--text); }\n.drawer-body { flex: 1; overflow-y: auto; padding: var(--s-5); display: flex; flex-direction: column; gap: var(--s-5); }\n\n.drawer-section h3 {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 1px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  margin-bottom: var(--s-3);\n}\n\n.drawer-kv {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--s-3) var(--s-4);\n}\n.drawer-kv .k {\n  font-size: 11px;\n  color: var(--text-3);\n  font-family: var(--font-mono);\n  text-transform: uppercase;\n  letter-spacing: 0.5px;\n}\n.drawer-kv .v {\n  font-size: 13px;\n  color: var(--text);\n  font-weight: 500;\n  margin-top: 2px;\n}\n\n.drawer-hazard {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  padding: var(--s-3);\n  background: var(--surface-2);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n}\n.drawer-hazard .haz-info { display: flex; flex-direction: column; gap: 2px; }\n.drawer-hazard .haz-cls {\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--text);\n}\n.drawer-hazard .haz-stmt {\n  font-size: 11px;\n  color: var(--text-3);\n  font-family: var(--font-mono);\n}\n\n/* Timeline */\n.timeline { display: flex; flex-direction: column; }\n.tl-item {\n  display: grid;\n  grid-template-columns: 28px 1fr;\n  gap: var(--s-3);\n  padding-bottom: var(--s-4);\n  position: relative;\n}\n.tl-item:not(:last-child)::after {\n  content: '';\n  position: absolute;\n  left: 13px;\n  top: 28px;\n  bottom: 0;\n  width: 1px;\n  background: var(--border);\n}\n.tl-node {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  border: 1.5px solid var(--border-strong);\n  background: var(--surface);\n  display: grid;\n  place-items: center;\n  color: var(--text-3);\n  z-index: 1;\n}\n.tl-node svg { width: 13px; height: 13px; }\n.tl-item.done .tl-node { background: var(--success); border-color: var(--success); color: #fff; }\n.tl-item.active .tl-node { background: var(--accent); border-color: var(--accent); color: #fff; }\n.tl-item.rejected .tl-node { background: var(--danger); border-color: var(--danger); color: #fff; }\n.tl-content { padding-top: 2px; }\n.tl-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }\n.tl-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; font-family: var(--font-mono); }\n.tl-note {\n  font-size: 12px;\n  color: var(--text-2);\n  background: var(--surface-2);\n  border-left: 2px solid var(--border-strong);\n  padding: 6px 10px;\n  border-radius: 0 var(--r-md) var(--r-md) 0;\n  margin-top: 6px;\n  line-height: 1.5;\n}\n.tl-item.active .tl-note { border-left-color: var(--accent); }\n.tl-item.rejected .tl-note { border-left-color: var(--danger); }\n\n/* Comments */\n.comment-input {\n  display: flex;\n  gap: var(--s-2);\n  align-items: flex-end;\n  margin-top: var(--s-3);\n}\n.comment-input textarea {\n  flex: 1;\n  background: var(--surface-2);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  padding: 8px 10px;\n  font-size: 12px;\n  resize: none;\n  min-height: 38px;\n  outline: none;\n}\n.comment-input textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }\n\n.drawer-foot {\n  padding: var(--s-3) var(--s-5);\n  border-top: 1px solid var(--border);\n  background: var(--surface-2);\n  display: flex;\n  gap: var(--s-2);\n  justify-content: flex-end;\n}\n\n/* ============== HAZARD PICKER (form) ============== */\n.hazard-picker {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));\n  gap: var(--s-2);\n}\n.hazard-opt {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 6px;\n  padding: var(--s-3);\n  border: 1.5px solid var(--border);\n  border-radius: var(--r-md);\n  background: var(--surface);\n  cursor: pointer;\n  text-align: center;\n  transition: border-color 0.12s, background 0.12s;\n}\n.hazard-opt:hover { border-color: var(--border-strong); }\n.hazard-opt.selected { border-color: var(--accent); background: var(--accent-soft); }\n.hazard-opt .haz-name {\n  font-size: 11px;\n  font-weight: 500;\n  color: var(--text-2);\n}\n.hazard-opt.selected .haz-name { color: var(--text); font-weight: 600; }\n\n/* PPE recommendation */\n.ppe-strip {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px;\n  padding: var(--s-3);\n  background: var(--info-soft);\n  border: 1px solid var(--info-tint);\n  border-radius: var(--r-md);\n  margin-top: var(--s-3);\n}\n[data-theme=\"dark\"] .ppe-strip { color: var(--text); }\n.ppe-strip-head {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  width: 100%;\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--info);\n  margin-bottom: 2px;\n}\n[data-theme=\"dark\"] .ppe-strip-head { color: #93c5fd; }\n.ppe-strip-head svg { width: 14px; height: 14px; }\n.ppe-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 3px 9px;\n  background: var(--surface);\n  border: 1px solid var(--info-tint);\n  border-radius: 999px;\n  font-size: 11px;\n  color: var(--text);\n  font-weight: 500;\n}\n.ppe-chip svg { width: 12px; height: 12px; color: var(--info); }\n\n/* ============== MASTER SHEET TABLE ============== */\n.ms-toolbar {\n  display: flex;\n  gap: var(--s-2);\n  align-items: center;\n  padding: var(--s-3) var(--s-4);\n  border-bottom: 1px solid var(--border);\n  background: var(--surface-2);\n  flex-wrap: wrap;\n}\n.ms-toolbar .ms-search {\n  flex: 1;\n  min-width: 200px;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  padding: 5px var(--s-3);\n  color: var(--text-3);\n}\n.ms-toolbar .ms-search input {\n  flex: 1;\n  border: none;\n  background: transparent;\n  outline: none;\n  font-size: 13px;\n  color: var(--text);\n}\n.ms-chip-filter {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 4px 10px;\n  border: 1px solid var(--border);\n  border-radius: 999px;\n  background: var(--surface);\n  font-size: 12px;\n  color: var(--text-2);\n  cursor: pointer;\n}\n.ms-chip-filter:hover { border-color: var(--border-strong); color: var(--text); }\n.ms-chip-filter.active {\n  border-color: var(--accent);\n  color: var(--accent);\n  background: var(--accent-soft);\n}\n\n.ms-table tbody tr { cursor: pointer; }\n.ms-table .ghs-stack.tight { gap: 0; }\n.ms-table .haz-cell { display: flex; align-items: center; gap: var(--s-2); }\n.ms-table .haz-cell .ghs { width: 26px; height: 26px; border-width: 1.5px; }\n.ms-table .haz-cell .ghs svg { width: 60%; height: 60%; }\n\n.haz-class-pill {\n  display: inline-flex;\n  align-items: center;\n  padding: 2px 8px;\n  border-radius: 4px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.3px;\n}\n.haz-class-pill.h1 { background: var(--danger-tint); color: var(--danger); }\n.haz-class-pill.h2 { background: var(--warning-tint); color: var(--warning); }\n.haz-class-pill.h3 { background: var(--info-tint); color: var(--info); }\n.haz-class-pill.h4 { background: var(--success-tint); color: var(--success); }\n\n/* Inventory bar */\n.inv-bar {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n}\n.inv-bar-track {\n  width: 60px;\n  height: 4px;\n  background: var(--surface-3);\n  border-radius: 2px;\n  overflow: hidden;\n  position: relative;\n}\n.inv-bar-fill {\n  height: 100%;\n  border-radius: 2px;\n  background: var(--success);\n}\n.inv-bar-fill.warn { background: var(--warning); }\n.inv-bar-fill.danger { background: var(--danger); }\n.inv-bar-val {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-2);\n}\n\n/* ============== KPI MINI ROW ============== */\n.kpi-row {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: var(--s-4);\n  margin-bottom: var(--s-5);\n}\n.kpi {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  padding: var(--s-4) var(--s-5);\n  position: relative;\n  overflow: hidden;\n}\n.kpi-top {\n  display: flex; justify-content: space-between; align-items: center;\n  margin-bottom: 6px;\n}\n.kpi-label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  font-weight: 500;\n}\n.kpi-delta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  padding: 1px 6px;\n  border-radius: 3px;\n  font-weight: 600;\n}\n.kpi-delta.up { background: var(--success-soft); color: var(--success); }\n.kpi-delta.down { background: var(--danger-soft); color: var(--danger); }\n.kpi-delta.flat { background: var(--surface-3); color: var(--text-3); }\n.kpi-value {\n  font-size: 26px;\n  font-weight: 600;\n  letter-spacing: -0.4px;\n  color: var(--text);\n  line-height: 1.1;\n  font-feature-settings: 'tnum';\n}\n\n/* ============== STICKY FORM BAR ============== */\n.form-sticky-bar {\n  position: sticky;\n  bottom: 0;\n  background: var(--surface);\n  border-top: 1px solid var(--border);\n  padding: 10px var(--s-5);\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  margin: 0 calc(-1 * var(--s-7));\n  padding-left: var(--s-7);\n  padding-right: var(--s-7);\n  box-shadow: 0 -4px 12px -4px rgba(16, 24, 40, 0.06);\n  z-index: 10;\n}\n.form-sticky-bar .form-progress {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  font-size: 12px;\n  color: var(--text-3);\n  flex: 1;\n}\n.form-sticky-bar .progress-track {\n  width: 140px;\n  height: 4px;\n  background: var(--surface-3);\n  border-radius: 2px;\n  overflow: hidden;\n}\n.form-sticky-bar .progress-fill {\n  height: 100%;\n  background: var(--accent);\n  border-radius: 2px;\n  transition: width 0.3s;\n}\n.form-sticky-bar .progress-val {\n  font-family: var(--font-mono);\n  font-weight: 600;\n  color: var(--text);\n}\n\n/* PRINT */\n@media print {\n  .sidebar, .topbar, .form-aside, .form-sticky-bar, .page-actions, .tweaks-panel, .drawer, .drawer-backdrop, .nav-toggle { display: none !important; }\n  .app { grid-template-columns: 1fr !important; }\n  .content { padding: 0 !important; }\n  body { background: white !important; }\n  .form-section, .card, .queue-card { box-shadow: none !important; border-color: #ccc !important; page-break-inside: avoid; }\n}\n<\u002Fstyle>\n<style>/* =====================================================\n   TPC SolutionHub v3 — Control Center additions\n   ===================================================== */\n\n/* ============== OPS STATUS STRIP ============== */\n.ops-strip {\n  position: sticky;\n  top: 0;\n  z-index: 60;\n  height: 32px;\n  background: #0B0E12;\n  color: #E4E7EC;\n  display: flex;\n  align-items: center;\n  gap: 0;\n  padding: 0;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.4px;\n  border-bottom: 1px solid #2A313D;\n}\n[data-theme=\"dark\"] .ops-strip {\n  border-bottom: 1px solid var(--border);\n}\n\n.ops-strip-brand {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 0 16px;\n  height: 100%;\n  background: linear-gradient(90deg, #14181F 0%, #0B0E12 100%);\n  border-right: 1px solid #2A313D;\n  font-weight: 600;\n  color: #fff;\n}\n.ops-strip-brand .live-pulse {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: #079455;\n  position: relative;\n}\n.ops-strip-brand .live-pulse::after {\n  content: ''; position: absolute; inset: 0;\n  border-radius: 50%; background: #079455;\n  animation: pulseRing 2s ease-out infinite;\n}\n@keyframes pulseRing {\n  0% { transform: scale(1); opacity: 0.6; }\n  100% { transform: scale(3); opacity: 0; }\n}\n\n.ops-strip-metrics {\n  display: flex;\n  align-items: center;\n  flex: 1;\n  height: 100%;\n  overflow: hidden;\n}\n.ops-metric {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 0 18px;\n  height: 100%;\n  border-right: 1px solid #2A313D;\n  white-space: nowrap;\n}\n.ops-metric .ops-label {\n  color: #98A2B3;\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: 0.6px;\n}\n.ops-metric .ops-val {\n  color: #fff;\n  font-weight: 600;\n}\n.ops-metric .ops-val.up { color: #5CD89F; }\n.ops-metric .ops-val.warn { color: #FFB81C; }\n.ops-metric .ops-val.danger { color: #FF7A6B; }\n\n.ops-strip-right {\n  display: flex;\n  align-items: center;\n  gap: 0;\n  height: 100%;\n}\n.ops-time {\n  padding: 0 16px;\n  height: 100%;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  color: #98A2B3;\n  font-size: 10px;\n}\n.ops-time strong { color: #fff; font-weight: 600; }\n.ops-hazard-band {\n  width: 96px;\n  height: 100%;\n  background: repeating-linear-gradient(\n    -45deg,\n    #FFB81C 0,\n    #FFB81C 6px,\n    #0B0E12 6px,\n    #0B0E12 12px\n  );\n  position: relative;\n}\n.ops-hazard-band::after {\n  content: 'TPC · HSE';\n  position: absolute;\n  inset: 0;\n  display: grid; place-items: center;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  font-weight: 700;\n  color: #0B0E12;\n  background: linear-gradient(90deg, transparent 0%, rgba(255,184,28,0.85) 30%, rgba(255,184,28,0.85) 70%, transparent 100%);\n  letter-spacing: 1px;\n}\n\n/* Topbar stacks below the sticky ops strip */\n.topbar { top: 32px; }\n\n/* ============== REFINED BRAND MARK ============== */\n.brand-mark.v3 {\n  width: 32px;\n  height: 32px;\n  border-radius: 6px;\n  position: relative;\n  overflow: hidden;\n  background: #0B0E12;\n  display: grid;\n  place-items: center;\n  box-shadow: 0 1px 3px rgba(16,24,40,0.15);\n}\n.brand-mark.v3::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background:\n    linear-gradient(180deg,\n      #FFB81C 0%, #FFB81C 33%,\n      #C8102E 33%, #C8102E 66%,\n      #0B0E12 66%, #0B0E12 100%);\n  opacity: 1;\n}\n.brand-mark.v3 span {\n  position: relative;\n  z-index: 1;\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: 11px;\n  color: #fff;\n  letter-spacing: -0.3px;\n  text-shadow: 0 1px 0 rgba(0,0,0,0.4);\n  mix-blend-mode: difference;\n}\n\n/* ============== DISPLAY METRICS ============== */\n.display-row {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 1px;\n  background: var(--border);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n  margin-bottom: var(--s-7);\n}\n.display-cell {\n  background: var(--surface);\n  padding: var(--s-6) var(--s-7);\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-3);\n  position: relative;\n}\n.display-cell::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 0;\n  width: 28px; height: 3px;\n  background: var(--accent);\n}\n.display-cell:nth-child(2)::before { background: var(--success); }\n.display-cell:nth-child(3)::before { background: var(--warning); }\n.display-label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 1px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  font-weight: 500;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n}\n.display-label svg { width: 12px; height: 12px; }\n.display-value {\n  font-family: var(--font-mono);\n  font-size: 44px;\n  font-weight: 600;\n  letter-spacing: -1.5px;\n  color: var(--text);\n  line-height: 1;\n  font-feature-settings: 'tnum', 'lnum';\n}\n.display-value .unit {\n  font-size: 18px;\n  color: var(--text-3);\n  font-weight: 500;\n  margin-left: 4px;\n  letter-spacing: -0.5px;\n}\n.display-sub {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  font-size: 12px;\n  color: var(--text-3);\n}\n.display-sub .delta { font-family: var(--font-mono); font-weight: 600; }\n.display-sub .delta.up { color: var(--success); }\n.display-sub .delta.down { color: var(--danger); }\n.display-spark { height: 32px; margin-top: 4px; }\n\n/* ============== APPROVAL FLOW (SANKEY-style) ============== */\n.flow-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n  margin-bottom: var(--s-7);\n}\n.flow-body { padding: var(--s-5) var(--s-6); }\n.flow-stages {\n  display: grid;\n  grid-template-columns: repeat(6, 1fr);\n  gap: 8px;\n  position: relative;\n}\n.flow-stage {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  cursor: pointer;\n  padding: 6px;\n  border-radius: var(--r-md);\n  transition: background 0.15s;\n}\n.flow-stage:hover { background: var(--surface-2); }\n.flow-stage-head {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n}\n.flow-stage-name {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.5px;\n  text-transform: uppercase;\n  color: var(--text-3);\n  font-weight: 500;\n}\n.flow-stage-count {\n  font-family: var(--font-mono);\n  font-size: 22px;\n  font-weight: 600;\n  color: var(--text);\n  letter-spacing: -0.6px;\n  line-height: 1;\n}\n.flow-stage-bar {\n  height: 8px;\n  background: var(--surface-3);\n  border-radius: 2px;\n  overflow: hidden;\n  position: relative;\n  display: flex;\n}\n.flow-stage-bar .seg {\n  height: 100%;\n  transition: width 0.3s;\n}\n.flow-stage-bar .seg.normal { background: var(--success); }\n.flow-stage-bar .seg.warn { background: var(--warning); }\n.flow-stage-bar .seg.danger { background: var(--danger); }\n.flow-stage-meta {\n  font-size: 11px;\n  color: var(--text-3);\n  display: flex;\n  align-items: center;\n  gap: 4px;\n}\n.flow-stage-meta svg { width: 12px; height: 12px; }\n\n/* Connector arrows between stages */\n.flow-connectors {\n  display: grid;\n  grid-template-columns: repeat(6, 1fr);\n  gap: 8px;\n  margin-top: 8px;\n  padding: 0 6px;\n}\n.flow-connector {\n  position: relative;\n  height: 24px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n.flow-connector::before {\n  content: '';\n  position: absolute;\n  left: 50%;\n  top: 0;\n  width: 100%;\n  height: 1px;\n  background: var(--border);\n}\n.flow-connector:last-child::before { display: none; }\n.flow-connector .arrow {\n  position: absolute;\n  right: -4px; top: -5px;\n  color: var(--text-4);\n  font-size: 10px;\n  line-height: 1;\n}\n.flow-connector .flow-num {\n  position: relative;\n  z-index: 1;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-3);\n  background: var(--surface);\n  padding: 2px 8px;\n  border: 1px solid var(--border);\n  border-radius: 999px;\n  display: flex;\n  align-items: center;\n  gap: 4px;\n}\n.flow-connector .flow-num svg { width: 10px; height: 10px; }\n\n/* ============== ACTIVITY STREAM ============== */\n.activity-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-lg);\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n  max-height: 420px;\n}\n.activity-list {\n  flex: 1;\n  overflow-y: auto;\n  padding: var(--s-2) 0;\n}\n.activity-item {\n  display: grid;\n  grid-template-columns: 28px 1fr auto;\n  gap: var(--s-3);\n  padding: 10px var(--s-5);\n  border-bottom: 1px solid var(--border);\n  font-size: 12px;\n  align-items: flex-start;\n}\n.activity-item:last-child { border-bottom: none; }\n.activity-icon {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  display: grid;\n  place-items: center;\n  flex-shrink: 0;\n  background: var(--surface-3);\n  color: var(--text-3);\n}\n.activity-icon svg { width: 13px; height: 13px; }\n.activity-icon.success { background: var(--success-soft); color: var(--success); }\n.activity-icon.warning { background: var(--warning-soft); color: var(--warning); }\n.activity-icon.danger { background: var(--danger-soft); color: var(--danger); }\n.activity-icon.info { background: var(--info-soft); color: var(--info); }\n.activity-icon.accent { background: var(--accent-soft); color: var(--accent); }\n.activity-body { min-width: 0; }\n.activity-text { color: var(--text); line-height: 1.4; }\n.activity-text strong { font-weight: 600; }\n.activity-text .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-2); }\n.activity-meta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-4);\n  margin-top: 2px;\n  text-transform: uppercase;\n  letter-spacing: 0.3px;\n}\n.activity-time {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--text-4);\n  white-space: nowrap;\n}\n\n/* ============== COMMAND PALETTE ============== */\n.cmdk-backdrop {\n  position: fixed;\n  inset: 0;\n  background: rgba(16, 24, 40, 0.5);\n  backdrop-filter: blur(4px);\n  -webkit-backdrop-filter: blur(4px);\n  z-index: 400;\n  display: none;\n  align-items: flex-start;\n  justify-content: center;\n  padding-top: 100px;\n}\n[data-theme=\"dark\"] .cmdk-backdrop { background: rgba(0, 0, 0, 0.65); }\n.cmdk-backdrop.open { display: flex; }\n\n.cmdk {\n  width: min(640px, 90vw);\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--r-xl);\n  box-shadow: var(--shadow-lg);\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n  animation: cmdkIn 0.18s ease-out;\n}\n@keyframes cmdkIn {\n  from { opacity: 0; transform: translateY(-12px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n.cmdk-input-row {\n  padding: var(--s-4) var(--s-5);\n  border-bottom: 1px solid var(--border);\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n}\n.cmdk-input-row svg { width: 18px; height: 18px; color: var(--text-3); }\n.cmdk-input-row input {\n  flex: 1;\n  border: none;\n  outline: none;\n  font-size: 16px;\n  font-family: inherit;\n  color: var(--text);\n  background: transparent;\n}\n.cmdk-input-row .kbd-esc {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  padding: 2px 8px;\n  border: 1px solid var(--border);\n  border-radius: 4px;\n  color: var(--text-3);\n}\n\n.cmdk-results {\n  max-height: 380px;\n  overflow-y: auto;\n  padding: 4px;\n}\n.cmdk-group-title {\n  padding: 8px 12px 4px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 1px;\n  text-transform: uppercase;\n  color: var(--text-4);\n  font-weight: 500;\n}\n.cmdk-item {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  padding: 8px 12px;\n  border-radius: var(--r-md);\n  cursor: pointer;\n  user-select: none;\n}\n.cmdk-item:hover, .cmdk-item.selected { background: var(--surface-3); }\n.cmdk-item .cmdk-icon {\n  width: 22px; height: 22px;\n  display: grid; place-items: center;\n  color: var(--text-3);\n}\n.cmdk-item .cmdk-icon svg { width: 16px; height: 16px; }\n.cmdk-item-text {\n  flex: 1;\n  font-size: 13px;\n  color: var(--text);\n}\n.cmdk-item-text .cmdk-sub {\n  font-size: 11px;\n no { font-family: var(--font-mono); color: var(--warning); font-weight: 600; }\n\n/* ============== DISBURSEMENT METHOD PICKER ============== */\n.method-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: var(--s-3);\n}\n.method-opt {\n  display: flex;\n  align-items: flex-start;\n  gap: var(--s-3);\n  padding: var(--s-4);\n  border: 1.5px solid var(--border);\n  border-radius: var(--r-md);\n  background: var(--surface);\n  cursor: pointer;\n  text-align: left;\n  transition: border-color 0.12s, background 0.12s;\n  position: relative;\n}\n.method-opt:hover { border-color: var(--border-strong); }\n.method-opt.selected { border-color: var(--accent); background: var(--accent-soft); }\n.method-opt-icon {\n  width: 36px;\n  height: 36px;\n  border-radius: var(--r-md);\n  background: var(--surface-3);\n  color: var(--text);\n  display: grid;\n  place-items: center;\n  flex-shrink: 0;\n}\n.method-opt-icon svg { width: 18px; height: 18px; }\n.method-opt.selected .method-opt-icon { background: var(--accent); color: #fff; }\n.method-opt-name {\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--text);\n}\n.method-opt-sub {\n  font-size: 11px;\n  color: var(--text-3);\n  font-family: var(--font-mono);\n  letter-spacing: 0.3px;\n  margin-top: 2px;\n}\n.method-opt-check {\n  position: absolute;\n  top: 12px; right: 12px;\n  width: 18px; height: 18px;\n  border-radius: 50%;\n  background: var(--accent);\n  display: none;\n  align-items: center;\n  justify-content: center;\n  color: #fff;\n}\n.method-opt-check svg { width: 12px; height: 12px; }\n.method-opt.selected .method-opt-check { display: flex; }\n\n/* ============== PURPOSE PICKER ============== */\n.purpose-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));\n  gap: var(--s-2);\n}\n.purpose-opt {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 6px;\n  padding: var(--s-3);\n  border: 1.5px solid var(--border);\n  border-radius:  var(--r-md);\n  padding: var(--s-3) var(--s-4);\n}\n.breakdown-row {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  padding: 4px 0;\n  font-size: 12px;\n}\n.breakdown-row.total {\n  border-top: 1px dashed var(--border-strong);\n  margin-top: 4px;\n  padding-top: 8px;\n}\n.breakdown-row .lbl { color: var(--text-3); }\n.breakdown-row .val { font-family: var(--font-mono); color: var(--text); font-weight: 500; }\n.breakdown-row.total .lbl { color: var(--text); font-weight: 600; }\n.breakdown-row.total .val { color: var(--accent); font-weight: 600; font-size: 14px; }\n\n/* ============== RECEIPT UPLOADER (Reconciliation) ============== */\n.receipt-row {\n  display: grid;\n  grid-template-columns: 32px 1fr 130px 100px 32px;\n  gap: var(--s-3);\n  padding: 10px var(--s-3);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  background: var(--surface);\n  align-items: center;\n  margin-bottom: 6px;\n}\n.receipt-row .icon {\n  width: 32px;\n  height: 32px;\n  border-radius: var(--r-sm);\n  background: var(--surface-3);\n  color: var(--text-3);\n  display: grid;\n  place-items: center;\n}\n.receipt-row .icon svg { width: 14px; height: 14px; }\n.receipt-row input.desc {\n  border: none;\n  background: transparent;\n  font-size: 13px;\n  color: var(--text);\n  outline: none;\n  width: 100%;\n}\n.receipt-row input.desc::placeholder { color: var(--text-4); }\n.receipt-row select.cat {\n  border: none;\n  background: transparent;\n  font-size: 12px;\n  color: var(--text-2);\n  outline: none;\n  width: 100%;\n  font-family: inherit;\n}\n.receipt-row .amt-cell {\n  display: flex;\n  align-items: center;\n  gap: 4px;\n  border: 1px solid var(--border);\n  background: var(--surface-2);\n  padding: 4px 8px;\n  border-radius: 4px;\n}\n.receipt-row .amt-cell input {\n  border: none;\n  background: transparent;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text);\n  outline: none;\n  width: 100%;\n  text-align: right;\n  font-weight: 600;\n}\n.receipt-row .amt-cell .tag { font-family: var(--font-mono); font-size: 9px; color: var(--text-4); font-weight: 500; }\n.receipt-row .rm {\n  width: 28px;\n  height: 28px;\n  border-radius: var(--r-sm);\n  display: grid;\n  place-items: center;\n  color: var(--text-4);\n}\n.receipt-row .rm:hover { background: var(--danger-soft); color: var(--danger); }\n\n.recon-totals {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 1px;\n  background: var(--border);\n  border: 1px solid var(--border);\n  border-radius: var(--r-md);\n  overflow: hidden;\n  margin-top: var(--s-3);\n}\n.recon-totals .cell {\n  background: var(--surface);\n  padding: var(--s-3) var(--s-4);\n  text-align: center;\n}\n.recon-totals .cell .l {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: 0.5px;\n  color: var(--text-3);\n  margin-bottom: 2px;\n}\n.recon-totals .cell .v {\n  font-family: var(--font-mono);\n  font-size: 20px;\n  font-weight: 600;\n  color: var(--text);\n  letter-spacing: -0.3px;\n}\n.recon-totals .cell.surplus .v { color: var(--success); }\n.recon-totals .cell.deficit .v { color: var(--danger); }\n<\u002Fstyle>\n<style>/* TPC SolutionHub — Daily Expense module */\n\n/* ============== EXPENSE CATEGORIES ============== */\n.cat-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 3px 10px;\n  border-radius: 999px;\n  font-size: 11px;\n  font-weight: 500;\n  border: 1px solid;\n}\n.cat-chip svg { width: 12px; height: 12px; }\n\n.cat-meals      { background: #FFF4E5; color: #B45309; border-color: #FED7AA; }\n.cat-transport  { background: #EFF8FF; color: #175CD3; border-color: #B2DDFF; }\n.cat-fuel       { background: #FEF3F2; color: #B42318; border-color: #FECDCA; }\n.cat-lodging    { background: #F4F3FF; color: #5925DC; border-color: #D9D6FE; }\n.cat-comms      { background: #ECFDF3; color: #027A48; border-color: #ABEFC6; }\n.cat-supplies   { background: #FE
